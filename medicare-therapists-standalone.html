    // blob URLs load and parent.location is writable).

    }

    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;

;gap:11px;align-items:center;\">\n      <div style=\"width:38px;height:38px;border-radius:50%;border:3px solid #2F5616;position:relative;flex:0 0 auto;\">\n        <span style=\"position:absolute;right:-3px;top:4px;width:11px;height:11px;border-radius:50%;background:#7DC242;\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:13px;font-weight:700;line-height:1.05;color:#2F5616;\">Manhattan<br>Mental Health<br>Counseling<\u002Fdiv>\n    <\u002Fdiv>\n    <div data-mob=\"hide\" style=\"display:flex;gap:26px;align-items:center;font-size:14.5px;font-weight:500;color:#2C3A22;\">\n      <span>About Us<\u002Fspan><span style=\"color:#2F5616;font-weight:700;\">Insurance<\u002Fspan><span>Services<\u002Fspan><span>Holistic Therapy<\u002Fspan><span>Blog<\u002Fspan>\n      <a href=\"#contact-now\" style=\"text-decoration:none;background:#8FD15F;color:#1E3A10;font-weight:700;border-radius:99px;padding:11px 22px;\">Start Therapy Now<\u002Fa>\n    <\u002Fdiv>\n    <a data-mob=\"show\" href=\"#contact-now\" style=\"display:none;text-decoration:none;background:#8FD15F;color:#1E3A10;font-weight:700;border-radius:99px;padding:10px 18px;font-size:13px;align-items:center;\">Start Therapy<\u002Fa>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== HERO ===== -->\n  <div style=\"position:relative;overflow:hidden;background:linear-gradient(180deg,#EFF7E7 0%,#E9F3E0 100%);\">\n    <div style=\"position:absolute;right:18px;top:13px;font-family:'DM Sans',sans-serif;font-size:11px;color:#7E8C6B;letter-spacing:0.02em;z-index:3;\">Last updated: June 2026<\u002Fdiv>\n    <div data-mob=\"hide\" style=\"position:absolute;right:0;top:-40px;bottom:-120px;width:48%;background:#9CD15C;clip-path:polygon(26% 0,100% 0,100% 100%,0% 100%);\"><\u002Fdiv>\n    <div data-hero=\"\" style=\"position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:52px 36px 60px;display:grid;grid-template-columns:1.02fr 0.94fr;gap:48px;align-items:center;\">\n      <div>\n        <div style=\"font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.11em;text-transform:uppercase;color:#3D6B1E;margin-bottom:16px;\">Medicare Part B Therapy · New York State<\u002Fdiv>\n        <h1 style=\"font-size:45px;line-height:1.08;font-weight:700;margin:0 0 16px;color:#1F3414;letter-spacing:-0.015em;text-wrap:pretty;\">Medicare-Covered Therapy in New York<\u002Fh1>\n        <p style=\"font-family:'DM Sans',sans-serif;font-size:16.5px;line-height:1.65;color:#3F4D34;margin:0 0 26px;max-width:520px;\">Original Medicare (Part B) covers online therapy in New York with no session limits. We verify your exact cost before your first session.<\u002Fp>\n        <div style=\"font-family:'DM Sans',sans-serif;\">\n          <a href=\"#contact-now\" style=\"display:inline-block;text-decoration:none;background:#8FD15F;color:#163209;font-size:15.5px;font-weight:700;border-radius:99px;padding:16px 36px;box-shadow:0 12px 26px rgba(61,107,30,0.22);\">Start Therapy Now<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Hero cost card (replaces carrier card) -->\n      <div style=\"position:relative;background:#FFFFFF;border-radius:20px;box-shadow:0 20px 44px rgba(35,40,46,0.16);overflow:hidden;border:1px solid #E2EDD6;\">\n        <div style=\"background:#2F5616;color:#FFFFFF;font-family:'DM Sans',sans-serif;padding:18px 24px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#AFD589;\">What you’ll pay<\u002Fdiv>\n          <div style=\"font-family:'PT Serif',serif;font-size:20px;font-weight:700;margin-top:3px;\">With Original Medicare<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'DM Sans',sans-serif;\">\n          <div style=\"display:flex;justify-content:space-between;gap:14px;padding:15px 24px;border-bottom:1px solid #EEF2E8;\">\n            <div style=\"font-size:14px;font-weight:600;color:#26301D;\">Part B + Medigap Plan G<\u002Fdiv>\n            <div style=\"font-size:14px;font-weight:700;color:#2F5616;text-align:right;flex:0 0 auto;\">$0 after deductible<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:14px;padding:15px 24px;border-bottom:1px solid #EEF2E8;\">\n            <div style=\"font-size:14px;font-weight:600;color:#26301D;\">Part B + Medigap Plan N<\u002Fdiv>\n            <div style=\"font-size:14px;font-weight:700;color:#2F5616;text-align:right;flex:0 0 auto;\">$0–$20<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:14px;padding:15px 24px;border-bottom:1px solid #EEF2E8;\">\n            <div style=\"font-size:14px;font-weight:600;color:#26301D;\">Part B only<\u002Fdiv>\n            <div style=\"font-size:13.5px;font-weight:700;color:#2F5616;text-align:right;flex:0 0 auto;max-width:160px;\">~$27/session<br><span style=\"font-weight:500;color:#79828A;font-size:12px;\">20% after $283 deductible<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:14px;padding:15px 24px;\">\n            <div style=\"font-size:14px;font-weight:600;color:#26301D;\">Medicare + Medicaid <span style=\"color:#79828A;font-weight:500;\">(dual-eligible)<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:14px;font-weight:700;color:#2F5616;text-align:right;flex:0 0 auto;\">Typically $0<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'DM Sans',sans-serif;background:#F0F8E6;border-top:1px solid #E2EDD6;padding:14px 24px;font-size:12.5px;line-height:1.55;color:#4A5740;\">Original Medicare works nationwide with any Medicare-enrolled therapist. We confirm your exact cost in advance.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Stats bar (dark band) overlapping the sweep -->\n    <div data-statwrap=\"\" style=\"position:relative;z-index:2;max-width:1080px;margin:0 auto;padding:0 36px 54px;\">\n      <div data-statband=\"\" style=\"background:#23391A;border-radius:18px;box-shadow:0 16px 42px rgba(35,40,46,0.18);display:flex;font-family:'DM Sans',sans-serif;overflow:hidden;color:#FFFFFF;\">\n        <div style=\"flex:1;padding:28px 16px;text-align:center;border-right:1px solid rgba(255,255,255,0.12);\">\n          <div data-statnum=\"\" style=\"font-size:36px;font-weight:800;letter-spacing:-0.02em;\">{{ costRange }}<\u002Fdiv>\n          <div style=\"font-size:13px;color:#C9DDB6;margin-top:6px;\">per session ($0 with Medigap)<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;padding:28px 16px;text-align:center;border-right:1px solid rgba(255,255,255,0.12);\">\n          <div data-statnum=\"\" style=\"font-size:36px;font-weight:800;letter-spacing:-0.02em;\">Same week<\u002Fdiv>\n          <div style=\"font-size:13px;color:#C9DDB6;margin-top:6px;\">to start your therapy<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;padding:28px 16px;text-align:center;\">\n          <div data-statnum=\"\" style=\"font-size:36px;font-weight:800;letter-spacing:-0.02em;\">5,000+<\u002Fdiv>\n          <div style=\"font-size:13px;color:#C9DDB6;margin-top:6px;\">clients served since 2014<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-family:'DM Sans',sans-serif;font-size:12px;line-height:1.6;color:#7E8C6B;margin:13px 4px 0;\">Source: the $0–$27 range is verified against the 2026 CMS Physician Fee Schedule (NYC); $0 with a Medigap supplement or Medicaid, up to about $27 coinsurance on Part B alone for a 60-minute session after the deductible.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== OPENING / INTRO ===== -->\n  <div style=\"max-width:760px;margin:0 auto;padding:54px 24px 0;\">\n    <p style=\"font-size:18px;line-height:1.75;margin:0;color:#33402A;\">Manhattan Mental Health Counseling provides 100% online therapy across New York State with 91+ Medicare-enrolled therapists. Original Medicare Part B covers outpatient therapy — including telehealth — with no annual session limits. Most beneficiaries with a Medigap supplement pay $0 per session; on Part B alone you pay about $27 after the $283 deductible, and no referral is required. We verify your exact Medicare cost before your first session, and you can often start the same week.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== QUICK ANSWERS ===== -->\n  <div id=\"quick-answers\" style=\"max-width:920px;margin:0 auto;padding:56px 24px 0;font-family:'DM Sans',sans-serif;\">\n    <div style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#3D6B1E;\">Quick answers<\u002Fdiv>\n    <h2 style=\"font-family:'PT Serif',serif;font-size:29px;margin:10px 0 22px;color:#2F5616;\">Quick Answers About Medicare Therapy in New York<\u002Fh2>\n    <div data-stack=\"\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n      <div style=\"display:flex;gap:16px;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px 24px;\">\n        <span style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;\">1<\u002Fspan>\n        <div>\n          <div style=\"font-size:16px;font-weight:700;color:#2F5616;line-height:1.35;\">Does Medicare cover therapy in New York?<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.6;color:#41513A;margin-top:9px;\">Yes. Original Medicare Part B covers outpatient therapy, including telehealth, when treatment is medically necessary and the therapist is Medicare-enrolled. There are no annual session limits.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:16px;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px 24px;\">\n        <span style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;\">2<\u002Fspan>\n        <div>\n          <div style=\"font-size:16px;font-weight:700;color:#2F5616;line-height:1.35;\">How much does therapy cost with Medicare?<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.6;color:#41513A;margin-top:9px;\">Original Medicare uses 20% coinsurance, not a fixed copay. On Part B alone, a 60-minute session in NYC runs about $27 after the $283 annual deductible. With a Medigap Plan G or N supplement, most beneficiaries pay $0 to $20 per session.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:16px;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px 24px;\">\n        <span style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;\">3<\u002Fspan>\n        <div>\n          <div style=\"font-size:16px;font-weight:700;color:#2F5616;line-height:1.35;\">Do I need a referral?<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.6;color:#41513A;margin-top:9px;\">No. Original Medicare does not require a referral to see a therapist.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:16px;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px 24px;\">\n        <span style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;\">4<\u002Fspan>\n        <div>\n          <div style=\"font-size:16px;font-weight:700;color:#2F5616;line-height:1.35;\">Does Medicare cover online (telehealth) therapy?<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.6;color:#41513A;margin-top:9px;\">Yes. Medicare covers behavioral health telehealth from your home at the same rate as in-person sessions, with no geographic restriction.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-qfull=\"\" style=\"grid-column:1 / -1;display:flex;gap:16px;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px 24px;\">\n        <span style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;\">5<\u002Fspan>\n        <div>\n          <div style=\"font-size:16px;font-weight:700;color:#2F5616;line-height:1.35;\">Is there a limit on how many therapy sessions Medicare covers?<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.6;color:#41513A;margin-top:9px;max-width:760px;\">No. Medicare Part B sets no annual cap on therapy sessions. Coverage continues as long as your therapist documents that treatment is medically necessary.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== WHICH MEDICARE PATH ===== -->\n  <div style=\"max-width:980px;margin:0 auto;padding:60px 24px 0;font-family:'DM Sans',sans-serif;\">\n    <div style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#3D6B1E;\">Find your path<\u002Fdiv>\n    <h2 style=\"font-family:'PT Serif',serif;font-size:29px;margin:10px 0 14px;color:#2F5616;\">Which Kind of Medicare Do You Have?<\u002Fh2>\n    <p style=\"font-size:16.5px;line-height:1.7;margin:0 0 24px;color:#3A4730;max-width:760px;\">Your therapy cost depends on which Medicare path you are on. Find your situation below:<\u002Fp>\n    <div style=\"background:#FFFFFF;border:1px solid #E3E5DE;border-radius:16px;overflow:hidden;box-shadow:0 8px 28px rgba(35,40,46,0.05);\">\n      <table data-plantable=\"\" style=\"width:100%;border-collapse:collapse;font-size:14.5px;\">\n        <thead>\n          <tr>\n            <th style=\"text-align:left;padding:15px 22px;background:#2F5616;color:#FFFFFF;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;\">If you have…<\u002Fth>\n            <th style=\"text-align:left;padding:15px 20px;background:#F6F7F2;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#79828A;\">Your expected cost per session<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n            <td style=\"padding:17px 22px;border-top:1px solid #ECEEE7;font-weight:700;color:#2F5616;width:42%;vertical-align:top;\">Original Medicare (Part B) alone<\u002Ftd>\n            <td style=\"padding:17px 20px;border-top:1px solid #ECEEE7;color:#4A5740;line-height:1.6;\">The $283 annual deductible, then 20% coinsurance — about $27 for a 60-minute session in NYC. <strong style=\"color:#2F5616;\">This page is for you.<\u002Fstrong><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding:17px 22px;border-top:1px solid #ECEEE7;font-weight:700;color:#2F5616;vertical-align:top;\">Original Medicare + a Medigap supplement (Plan G or N)<\u002Ftd>\n            <td style=\"padding:17px 20px;border-top:1px solid #ECEEE7;color:#4A5740;line-height:1.6;\">$0 for most sessions (Medigap covers the coinsurance). <strong style=\"color:#2F5616;\">This page is for you<\u002Fstrong>, and New York gives you a real advantage here (see below).<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding:17px 22px;border-top:1px solid #ECEEE7;font-weight:700;color:#2F5616;vertical-align:top;\">Original Medicare + Medicaid (dual-eligible)<\u002Ftd>\n            <td style=\"padding:17px 20px;border-top:1px solid #ECEEE7;color:#4A5740;line-height:1.6;\">Typically $0. <strong style=\"color:#2F5616;\">This page is for you.<\u002Fstrong><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding:17px 22px;border-top:1px solid #ECEEE7;font-weight:700;color:#2F5616;vertical-align:top;\">A Medicare Advantage plan (Part C) from a carrier like Healthfirst, UnitedHealthcare, or Fidelis<\u002Ftd>\n            <td style=\"padding:17px 20px;border-top:1px solid #ECEEE7;color:#4A5740;line-height:1.6;\">Fixed copays set by your plan. <a href=\"#\" style=\"color:#3568A8;font-weight:700;text-decoration:none;\">See our Medicare Advantage guide instead →<\u002Fa><\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n    <div style=\"background:#F6F7F2;border:1px solid #E8EAE2;border-radius:12px;padding:18px 22px;margin-top:16px;font-size:14.5px;line-height:1.65;color:#4A5740;\"><strong style=\"color:#2F5616;\">A note on the terms:<\u002Fstrong> Medigap (also called a Medicare Supplement plan) is private insurance that covers costs Original Medicare leaves to you, including the 20% coinsurance. Dual-eligible means you qualify for both Medicare and Medicaid.<\u002Fdiv>\n    <p style=\"font-size:15.5px;line-height:1.7;margin:16px 2px 0;color:#3A4730;\"><strong style=\"color:#2F5616;\">Not sure which one you have?<\u002Fstrong> That is exactly what we confirm for you when you verify your benefits — we tell you your path and your exact cost.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== COVERAGE EXPLAINER (image-left) ===== -->\n  <div style=\"max-width:1080px;margin:0 auto;padding:64px 24px 0;\">\n    <div data-imgrow=\"\" style=\"display:flex;gap:40px;align-items:center;\">\n      <div data-imgcol=\"\" style=\"flex:0 0 42%;\">\n        <x-import component-from-global-scope=\"image-slot\" id=\"medicare-coverage-photo\" shape=\"rounded\" radius=\"20\" fit=\"cover\" placeholder=\"Senior having a Medicare-covered telehealth therapy session from home in New York\" style=\"width:100%;height:360px;display:block;box-shadow:0 18px 40px rgba(35,40,46,0.14);\" hint-size=\"100%,360px\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div style=\"flex:1;\">\n        <div style=\"font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#3D6B1E;\">What’s covered<\u002Fdiv>\n        <h2 style=\"font-size:29px;margin:10px 0 16px;color:#2F5616;\">What Mental Health Services Does Medicare Cover?<\u002Fh2>\n        <p style=\"font-size:16.5px;line-height:1.72;margin:0 0 16px;color:#3A4730;\">Original Medicare Part B covers individual psychotherapy, family therapy with the patient present, group therapy, psychiatric diagnostic evaluations, and medication management when treatment is medically necessary and delivered by a Medicare-enrolled provider. Coverage applies whether sessions are in-person or by telehealth.<\u002Fp>\n        <p style=\"font-size:16.5px;line-height:1.72;margin:0 0 16px;color:#3A4730;\">Medicare does not impose an annual cap on therapy sessions. As long as your therapist documents that treatment remains medically necessary, coverage continues, which means a Medicare beneficiary can attend weekly therapy for as long as the clinical need is there. (“Medically necessary” means your provider documents that the treatment is needed to treat a diagnosed condition or keep it from getting worse, which is the standard most people meet when they start therapy.) This is Medicare’s own coverage rule, not a state mandate.<\u002Fp>\n        <p style=\"font-size:16.5px;line-height:1.72;margin:0;color:#3A4730;\">Coverage is not limited to severe conditions. Medicare reimburses therapy for mild to moderate concerns when treatment prevents symptoms or daily functioning from getting worse, which is the situation most people are actually in when they start therapy.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== SECOND METRIC CALLOUT ===== -->\n  <div style=\"max-width:1080px;margin:0 auto;padding:56px 24px 0;\">\n    <div data-flexwrap=\"\" style=\"background:#23391A;border-radius:22px;overflow:hidden;display:flex;align-items:stretch;color:#FFFFFF;\">\n      <div style=\"flex:1;padding:40px 44px;font-family:'DM Sans',sans-serif;\">\n        <div style=\"font-family:'PT Serif',serif;font-size:24px;line-height:1.4;font-weight:700;\">Most beneficiaries with Medigap pay $0 per session.<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.65;color:#C9DDB6;margin:14px 0 0;\">5,000+ New Yorkers served since 2014. We verify your exact Medicare cost before your first session.<\u002Fp>\n        <div data-flexwrap=\"\" style=\"display:flex;gap:12px;margin-top:24px;\">\n          <a href=\"#contact-now\" style=\"text-decoration:none;background:#8FD15F;color:#163209;font-size:14.5px;font-weight:700;border-radius:99px;padding:13px 24px;\">Start Therapy Now<\u002Fa>\n          <a href=\"tel:2129608626\" style=\"text-decoration:none;background:#FFFFFF;color:#1F3414;font-size:14.5px;font-weight:700;border-radius:99px;padding:13px 24px;\">📞 212-960-8626<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-mob=\"hide\" style=\"flex:0 0 320px;\">\n        <x-import component-from-global-scope=\"image-slot\" id=\"medicare-callout-photo\" shape=\"rect\" fit=\"cover\" placeholder=\"Senior in New York having a Medicare-covered online therapy session from home\" style=\"width:100%;height:100%;min-height:240px;display:block;\" hint-size=\"320px,240px\"><\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== TELEHEALTH ===== -->\n  <div style=\"max-width:760px;margin:0 auto;padding:64px 24px 0;\">\n    <div style=\"font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#3D6B1E;\">Telehealth<\u002Fdiv>\n    <h2 style=\"font-size:29px;margin:10px 0 16px;color:#2F5616;\">Does Medicare Cover Online Therapy in 2026?<\u002Fh2>\n    <p style=\"font-size:17px;line-height:1.75;margin:0 0 18px;color:#3A4730;\">Yes. Medicare covers behavioral health telehealth as a permanent benefit: you can receive therapy from your home, with no rural or geographic restriction. Telehealth therapy is reimbursed at the same rate as an in-person session, so virtual care is a full Medicare benefit.<\u002Fp>\n    <p style=\"font-size:17px;line-height:1.75;margin:0 0 18px;color:#3A4730;\">When you verify your benefits with us, we confirm exactly what applies to your situation.<\u002Fp>\n    <p style=\"font-size:17px;line-height:1.75;margin:0;color:#3A4730;\">All MMHC sessions are conducted online via secure, HIPAA-compliant video, which removes the commute that often keeps older adults from attending therapy consistently.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== COST BREAKDOWN ===== -->\n  <div style=\"max-width:980px;margin:0 auto;padding:64px 24px 0;font-family:'DM Sans',sans-serif;\">\n    <div style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#3D6B1E;\">Cost<\u002Fdiv>\n    <h2 style=\"font-family:'PT Serif',serif;font-size:29px;margin:10px 0 16px;color:#2F5616;\">What Does Medicare Therapy Cost in New York? (2026)<\u002Fh2>\n    <p style=\"font-size:16.5px;line-height:1.72;margin:0 0 16px;color:#3A4730;\">A standard 60-minute therapy session in New York City costs about $27 out of pocket on Original Medicare Part B alone (after the deductible), or $0 with a Medigap supplement. Here is how that breaks down.<\u002Fp>\n    <p style=\"font-size:16.5px;line-height:1.72;margin:0 0 16px;color:#3A4730;\">Original Medicare does not use fixed copays for therapy. You pay 20% coinsurance (your share of the cost, the portion Medicare does not pay) of the Medicare-approved amount, after you meet the Part B deductible. (Fixed copays are a Medicare Advantage feature, which is one reason the two work so differently.) Your actual cost then depends on whether you carry a Medigap supplement or Medicaid.<\u002Fp>\n    <div data-stack3=\"\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:24px 0;\">\n      <div style=\"background:#FFFFFF;border:1px solid #E3E5DE;border-left:3px solid #7DC242;border-radius:14px;padding:20px 22px;\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#5FA12C;\">Part B alone<\u002Fdiv>\n        <div style=\"font-size:14.5px;line-height:1.6;color:#3A4730;margin-top:8px;\">$283 annual deductible (all Part B services), then 20% coinsurance per session — about $27 for a 60-minute session (CPT 90837) in NYC. No out-of-pocket maximum.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF;border:1px solid #E3E5DE;border-left:3px solid #7DC242;border-radius:14px;padding:20px 22px;\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#5FA12C;\">Part B + Medigap<\u002Fdiv>\n        <div style=\"font-size:14.5px;line-height:1.6;color:#3A4730;margin-top:8px;\"><strong style=\"color:#2F5616;\">Plan G:<\u002Fstrong> covers the 20% coinsurance after the $283 deductible — per-session cost $0. <strong style=\"color:#2F5616;\">Plan N:<\u002Fstrong> covers coinsurance, may charge a small office-visit copay — typically $0 to $20.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF;border:1px solid #E3E5DE;border-left:3px solid #7DC242;border-radius:14px;padding:20px 22px;\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#5FA12C;\">Dual-eligible<\u002Fdiv>\n        <div style=\"font-size:14.5px;line-height:1.6;color:#3A4730;margin-top:8px;\">Medicare + Medicaid: typically $0 per session.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <h3 style=\"font-family:'PT Serif',serif;font-size:21px;font-weight:700;color:#2F5616;margin:30px 0 6px;\">Your exact coinsurance for a 60-minute session (CPT 90837), by NYC locality, 2026<\u002Fh3>\n    <p style=\"font-size:15px;line-height:1.65;margin:0 0 16px;color:#4A5740;\">After the Part B deductible is met, your 20% coinsurance for a standard 60-minute therapy session in New York City is:<\u002Fp>\n    <div style=\"background:#FFFFFF;border:1px solid #E3E5DE;border-radius:16px;overflow:hidden;box-shadow:0 8px 28px rgba(35,40,46,0.05);\">\n      <table data-plantable=\"\" style=\"width:100%;border-collapse:collapse;font-size:14px;\">\n        <thead>\n          <tr>\n            <th style=\"text-align:left;padding:14px 20px;background:#2F5616;color:#FFFFFF;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;\">CMS locality<\u002Fth>\n            <th style=\"text-align:left;padding:14px 20px;background:#F6F7F2;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:#79828A;\">Counties<\u002Fth>\n            <th style=\"text-align:left;padding:14px 20px;background:#F6F7F2;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:#79828A;\">Approved amount<\u002Fth>\n            <th style=\"text-align:left;padding:14px 20px;background:#F6F7F2;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:#79828A;\">Your 20% coinsurance<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n            <td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;font-weight:700;color:#2F5616;font-family:'PT Serif',serif;font-size:17px;\">01<\u002Ftd>\n            <td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;color:#4A5740;\">Manhattan<\u002Ftd>\n            <td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;color:#4A5740;\">$136.48<\u002Ftd>\n            <td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;color:#26301D;font-weight:700;\">$27.30<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;font-weight:700;color:#2F5616;font-family:'PT Serif',serif;font-size:17px;\">02<\u002Ftd>\n            <td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;color:#4A5740;line-height:1.5;\">Bronx, Brooklyn, Staten Island, plus listed suburbs<\u002Ftd>\n            <td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;color:#4A5740;\">$137.42<\u002Ftd>\n            <td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;color:#26301D;font-weight:700;\">$27.48<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;font-weight:700;color:#2F5616;font-family:'PT Serif',serif;font-size:17px;\">04<\u002Ftd>\n            <td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;color:#4A5740;\">Queens<\u002Ftd>\n            <td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;color:#4A5740;\">$137.00<\u002Ftd>\n            <td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;color:#26301D;font-weight:700;\">$27.40<\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n    <p style=\"font-size:16px;line-height:1.7;margin:18px 0 22px;color:#3A4730;\">So for most New Yorkers on Part B alone, a full session costs about $27 out of pocket once the deductible is met, and $0 with a Medigap Plan G. Shorter sessions (45 or 30 minutes) cost less.<\u002Fp>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:14px;\">\n      <span style=\"font-family:'PT Serif',serif;font-size:19px;font-weight:700;color:#2F5616;\">What you’ll actually pay depends on a few things<\u002Fspan>\n      <span style=\"flex:1;height:1px;background:#E2EDD6;\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <sc-for list=\"{{ payDepends }}\" as=\"d\" hint-placeholder-count=\"4\">\n        <div style=\"display:flex;gap:14px;align-items:flex-start;background:#FFFFFF;border:1px solid #E3E5DE;border-left:4px solid #7DC242;border-radius:14px;padding:18px 22px;\">\n          <span style=\"display:inline-flex;width:24px;height:24px;border-radius:50%;background:#E5F3D3;color:#3D6B1E;font-size:13px;font-weight:700;align-items:center;justify-content:center;flex:0 0 auto;margin-top:1px;\">✓<\u002Fspan>\n          <div style=\"font-size:14.5px;line-height:1.65;color:#4A5740;\"><strong style=\"color:#26301D;\">{{ d.h }}<\u002Fstrong> {{ d.b }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <p style=\"font-size:16px;line-height:1.7;margin:22px 0 28px;color:#4A5740;\">We confirm exactly which of these applies to you, and your precise cost, in about 10 minutes before your first session: a real person and a real number, not a self-serve estimate to puzzle over.<\u002Fp>\n    <h3 style=\"font-family:'PT Serif',serif;font-size:21px;font-weight:700;color:#2F5616;margin:0 0 14px;\">Annual cost comparison (52 weekly 60-minute sessions)<\u002Fh3>\n    <div style=\"background:#FFFFFF;border:1px solid #E3E5DE;border-radius:16px;overflow:hidden;box-shadow:0 8px 28px rgba(35,40,46,0.05);\">\n      <table data-plantable=\"\" style=\"width:100%;border-collapse:collapse;font-size:14.5px;\">\n        <thead>\n          <tr>\n            <th style=\"text-align:left;padding:14px 22px;background:#2F5616;color:#FFFFFF;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;\">Coverage<\u002Fth>\n            <th style=\"text-align:left;padding:14px 20px;background:#F6F7F2;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:#79828A;\">What you pay per year<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr><td style=\"padding:15px 22px;border-top:1px solid #ECEEE7;font-weight:700;color:#2F5616;\">Part B + Medigap Plan G<\u002Ftd><td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;color:#26301D;font-weight:600;\">$283 (just the deductible)<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:15px 22px;border-top:1px solid #ECEEE7;font-weight:700;color:#2F5616;\">Part B + Medigap Plan N<\u002Ftd><td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;color:#26301D;font-weight:600;\">$283 + small copays<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:15px 22px;border-top:1px solid #ECEEE7;font-weight:700;color:#2F5616;\">Part B alone<\u002Ftd><td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;color:#26301D;font-weight:600;\">$283 + about $27 per session<\u002Ftd><\u002Ftr>\n          <tr><td style=\"padding:15px 22px;border-top:1px solid #ECEEE7;font-weight:700;color:#2F5616;\">Medicare + Medicaid (dual-eligible)<\u002Ftd><td style=\"padding:15px 20px;border-top:1px solid #ECEEE7;color:#26301D;font-weight:600;\">Typically $0<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n    <p style=\"font-size:12.5px;line-height:1.6;color:#79828A;margin:14px 2px 0;\">Source: 2026 CMS Physician Fee Schedule, NYC localities 01/02/04.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== NY MEDIGAP ADVANTAGE ===== -->\n  <div style=\"background:#F4F8EE;margin-top:64px;padding:60px 0;\">\n    <div style=\"max-width:880px;margin:0 auto;padding:0 24px;\">\n      <div style=\"font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#3D6B1E;\">New York advantage<\u002Fdiv>\n      <h2 style=\"font-size:30px;margin:10px 0 16px;color:#2F5616;\">A New York Advantage: How to Get to $0 Per Session<\u002Fh2>\n      <p style=\"font-size:16.5px;line-height:1.72;margin:0 0 16px;color:#3A4730;\">The $0-per-session path runs through Medigap (a Medicare Supplement plan), and New York is one of the best states in the country to get one. New York is one of only a handful of states (with Connecticut, Massachusetts, and Maine) that require Medigap insurers to sell you a policy year-round, regardless of your age, health, or pre-existing conditions. In most states, if you miss your one-time enrollment window you can be medically underwritten or denied. In New York, you cannot.<\u002Fp>\n      <p style=\"font-size:16.5px;line-height:1.72;margin:0 0 20px;color:#3A4730;\">Two things this means for a New Yorker on Original Medicare:<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:14px;margin-bottom:22px;\">\n        <sc-for list=\"{{ medigapPoints }}\" as=\"m\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex;gap:18px;align-items:flex-start;background:#FFFFFF;border:1px solid #E3EAD9;border-left:4px solid #7DC242;border-radius:16px;padding:22px 26px;font-family:'DM Sans',sans-serif;\">\n            <span style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;\">{{ m.n }}<\u002Fspan>\n            <div style=\"font-size:15px;line-height:1.7;color:#3A4730;\">{{ m.b }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"background:#FFF8E8;border:1px solid #EAD9A8;border-radius:14px;padding:18px 22px;font-family:'DM Sans',sans-serif;font-size:14.5px;line-height:1.65;color:#5E5326;margin-bottom:18px;\"><strong style=\"color:#8A6D14;\">One caveat to know:<\u002Fstrong> if you did not have at least six months of prior continuous coverage, a Medigap insurer may apply a waiting period of up to six months for a pre-existing condition. We can walk you through how this applies to you.<\u002Fdiv>\n      <p style=\"font-size:16.5px;line-height:1.72;margin:0 0 14px;color:#3A4730;\">This is a real, New-York-only reason the $0 path is more accessible here than almost anywhere else, and it is not something a national directory will tell you.<\u002Fp>\n      <p style=\"font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.6;color:#79828A;margin:0;\">Verified: KFF and NY Department of Financial Services. NY requires continuous guaranteed-issue, community-rated Medigap. Cited in Sources.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== MEDICARE ADVANTAGE POINTER ===== -->\n  <div style=\"max-width:760px;margin:0 auto;padding:64px 24px 0;\">\n    <div style=\"font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#3D6B1E;\">Medicare Advantage<\u002Fdiv>\n    <h2 style=\"font-size:29px;margin:10px 0 16px;color:#2F5616;\">Have a Medicare Advantage Plan Instead?<\u002Fh2>\n    <p style=\"font-size:17px;line-height:1.75;margin:0 0 20px;color:#3A4730;\">Medicare Advantage (Part C) plans work differently from Original Medicare: costs are set as fixed copays by your carrier, and you use the plan’s network. If you have a Medicare Advantage plan from Healthfirst, Molina, UnitedHealthcare, EmblemHealth, Fidelis, or another carrier, we cover that in detail on a dedicated page.<\u002Fp>\n    <a href=\"#\" style=\"font-family:'DM Sans',sans-serif;text-decoration:none;background:#FFFFFF;border:1px solid #C7D6B6;color:#2F5616;font-size:14.5px;font-weight:700;border-radius:99px;padding:13px 26px;display:inline-block;\">See our Medicare Advantage therapy guide →<\u002Fa>\n  <\u002Fdiv>\n\n  <!-- ===== PLAN-CONFUSION CTA ===== -->\n  <div style=\"max-width:1080px;margin:0 auto;padding:48px 24px 0;\">\n    <div data-flexwrap=\"\" style=\"background:#23391A;border-radius:22px;color:#FFFFFF;padding:40px 44px;font-family:'DM Sans',sans-serif;display:flex;justify-content:space-between;align-items:center;gap:28px;\">\n      <div>\n        <h2 style=\"font-family:'PT Serif',serif;font-size:25px;margin:0 0 8px;color:#FFFFFF;\">Not Sure Which Plan You Have?<\u002Fh2>\n        <p style=\"font-size:15px;line-height:1.65;color:#C9DDB6;margin:0;max-width:540px;\">We verify everything for you before your first session and explain your exact cost clearly.<\u002Fp>\n      <\u002Fdiv>\n      <div data-flexwrap=\"\" style=\"display:flex;gap:12px;flex:0 0 auto;\">\n        <a href=\"#contact-now\" style=\"text-decoration:none;background:#8FD15F;color:#163209;font-size:14.5px;font-weight:700;border-radius:99px;padding:14px 26px;white-spa >✓<\u002Fspan><span style=\"font-size:14.5px;color:#3A4730;\">All therapists Medicare-enrolled, billing Medicare directly<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:center;\"><span style=\"width:30px;height:30px;border-radius:50%;background:#E5F3D3;color:#3D6B1E;display:flex;align-items:center;justify-content:center;font-weight:700;flex:0 0 auto;\">✓<\u002Fspan><span style=\"font-size:14.5px;color:#3A4730;\">Exact cost confirmed before session one<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:center;\"><span style=\"width:30px;height:30px;border-radius:50%;background:#E5F3D3;color:#3D6B1E;display:flex;align-items:center;justify-content:center;font-weight:700;flex:0 0 auto;\">✓<\u002Fspan><span style=\"font-size:14.5px;color:#3A4730;\">First session often the same week<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:24px;font-size:14px;color:#5A6850;line-height:1.7;\">Prefer to talk? Call <a href=\"tel:2129608626\" style=\"color:#3568A8;font-weight:700;text-decoration:none;\">212-960-8626<\u002Fa><br>Manhattan Mental Health Counseling · 303 Fifth Avenue, Suite 1108, New York, NY 10016<br>Hours: Monday–Friday 8am–8pm<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:0 0 420px;width:100%;background:#FFFFFF;border:1px solid #DCE8CC;border-radius:20px;padding:30px 30px 34px;box-shadow:0 14px 32px rgba(61,107,30,0.08);\">\n        <div style=\"display:flex;flex-direction:column;gap:13px;\">\n          <input type=\"text\" placeholder=\"Full name\" style=\"width:100%;font-family:'DM Sans',sans-serif;font-size:14.5px;padding:13px 15px;border:1px solid #D7DECF;border-radius:10px;outline:none;\">\n          <input type=\"email\" placeholder=\"Email address\" style=\"width:100%;font-family:'DM Sans',sans-serif;font-size:14.5px;padding:13px 15px;border:1px solid #D7DECF;border-radius:10px;outline:none;\">\n          <input type=\"tel\" placeholder=\"Phone number\" style=\"width:100%;font-family:'DM Sans',sans-serif;font-size:14.5px;padding:13px 15px;border:1px solid #D7DECF;border-radius:10px;outline:none;\">\n          <input type=\"text\" value=\"Medicare (Original / Medigap)\" style=\"width:100%;font-family:'DM Sans',sans-serif;font-size:14.5px;padding:13px 15px;border:1px solid #D7DECF;border-radius:10px;outline:none;color:#2F5616;font-weight:600;background:#F4F8EE;\">\n          <textarea placeholder=\"What brings you to therapy? (optional)\" rows=\"3\" style=\"width:100%;font-family:'DM Sans',sans-serif;font-size:14.5px;padding:13px 15px;border:1px solid #D7DECF;border-radius:10px;outline:none;resize:vertical;\"><\u002Ftextarea>\n          <button style=\"width:100%;background:#8FD15F;color:#163209;font-family:'DM Sans',sans-serif;font-size:15.5px;font-weight:700;border:none;border-radius:99px;padding:15px 0;cursor:pointer;margin-top:4px;\">Verify My Medicare Coverage →<\u002Fbutton>\n          <div style=\"font-size:11.5px;color:#A6ACA1;text-align:center;line-height:1.5;\">Your information is confidential and used only to verify benefits and match you with a therapist.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== AUTHOR BYLINE + REFERENCES ===== -->\n  <div style=\"max-width:820px;margin:0 auto;padding:56px 24px 0;font-family:'DM Sans',sans-serif;\">\n    <div style=\"background:#F0F8E6;border:1px solid #DCE8CC;border-radius:18px;padding:26px 30px;display:flex;gap:18px;align-items:flex-start;\">\n      <div style=\"width:54px;height:54px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 auto;\">NB<\u002Fdiv>\n      <div>\n        <div style=\"font-family:'PT Serif',serif;font-size:19px;font-weight:700;color:#2F5616;\">Reviewed by Natalie Buchwald, LMHC-D<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.65;color:#41513A;margin:8px 0 0;\">Founder and Clinical Director of Manhattan Mental Health Counseling. A licensed mental health counselor in New York State, Natalie specializes in mood disorders, anxiety, burnout, and culture-based identity conflict using a holistic, mind-body approach. She holds a Master of Arts in Mental Health Counseling from Brooklyn College (CUNY) and is a fellow of the Karen Horney Institute.<\u002Fp>\n        <p style=\"font-size:13px;color:#79828A;margin:10px 0 0;\">Last Updated: June 2026 &nbsp;|&nbsp; Next Review: September 2026<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:36px;\">\n      <h2 style=\"font-family:'PT Serif',serif;font-size:22px;margin:0 0 16px;color:#2F5616;\">References<\u002Fh2>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <sc-for list=\"{{ refs }}\" as=\"r\" hint-placeholder-count=\"7\">\n          <div style=\"font-size:13px;line-height:1.6;color:#5A6850;border-left:3px solid #DCE8CC;padding-left:14px;\">{{ r.t }} <a href=\"{{ r.url }}\" style=\"color:#3568A8;text-decoration:none;word-break:break-all;\">{{ r.url }}<\u002Fa><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:28px;background:#F0F8E6;border:1px solid #DCE8CC;border-radius:14px;padding:18px 22px;font-size:13px;line-height:1.65;color:#41513A;\">\n      <strong style=\"color:#2F5616;\">Note:<\u002Fstrong> This page is for informational purposes and is not medical, legal, or financial advice. Coverage depends on your specific plan. Confirm details with Medicare or by verifying your benefits with us.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== CRISIS BAR ===== -->\n  <div style=\"font-family:'DM Sans',sans-serif;max-width:820px;margin:24px auto 0;padding:0 24px 72px;\">\n    <div style=\"border:1px solid #E8EAE2;border-radius:12px;padding:16px 22px;display:flex;gap:12px;align-items:center;background:#FDFDFB;\">\n      <span style=\"font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#8A9097;flex:0 0 auto;\">In crisis?<\u002Fspan>\n      <span style=\"font-size:13.5px;line-height:1.6;color:#5A6168;\">If you are currently experiencing a crisis, call or text 988 for free, confidential support. If there is immediate danger, call 911 or go to the nearest emergency room.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900},&quot;costRange&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;$0–$27&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;therapistCount&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;91+&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showSiteChrome&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { faq: 0, t: 0 };\n\n  renderVals() {\n    const costRange = this.props.costRange ?? '$0\\u2013$27';\n    const therapistCount = this.props.therapistCount ?? '91+';\n    const showChrome = this.props.showSiteChrome ?? true;\n\n    const quick = [\n      { q: 'Does Medicare cover therapy in New York?', a: 'Yes. Original Medicare Part B covers outpatient therapy, including telehealth, when treatment is medically necessary and the therapist is Medicare-enrolled. There are no annual session limits.' },\n      { q: 'How much does therapy cost with Medicare?', a: 'Original Medicare uses 20% coinsurance, not a fixed copay. On Part B alone, a 60-minute session in NYC runs about $27 after the $283 annual deductible. With a Medigap Plan G or N supplement, most beneficiaries pay $0 to $20 per session.' },\n      { q: 'Do I need a referral?', a: 'No. Original Medicare does not require a referral to see a therapist.' },\n      { q: 'Does Medicare cover online (telehealth) therapy?', a: 'Yes. Medicare covers behavioral health telehealth from your home at the same rate as in-person sessions, with no geographic restriction.' },\n      { q: 'Is there a limit on how many therapy sessions Medicare covers?', a: 'No. Medicare Part B sets no annual cap on therapy sessions. Coverage continues as long as your therapist documents that treatment is medically necessary.' }\n    ];\n\n    const payDepends = [\n      { h: 'A Medigap supplement.', b: 'If you carry Medigap Plan G or N, it covers the 20% coinsurance, so most sessions cost $0.' },\n      { h: 'Medicaid or dual eligibility.', b: 'If you have both Medicare and Medicaid, you typically owe little or nothing.' },\n      { h: 'Whether you\\u2019ve met your deductible yet.', b: 'Until you meet the $283 Part B deductible for the year, you pay the full Medicare-approved amount per session (about $137 for a 60-minute session in NYC), not just the 20%. Once the deductible is met, your cost drops to about $27, or $0 with Medigap.' },\n      { h: 'A Medicare Advantage plan.', b: 'If you are on Medicare Advantage instead of Original Medicare, your plan sets its own copay or coinsurance, which works differently. See our Medicare Advantage guide \\u2192' }\n    ];\n\n    const medigapPoints = [\n      { n: '1', b: 'You can add or switch a Medigap plan at any time of year, not just during a narrow window. If you are on Part B alone today and want to get to $0 per session, you are not locked out.' },\n      { n: '2', b: 'Your premium is community-rated. It does not go up because of your age or health; it varies only by where in New York you live. Everyone pays the same rate for the same plan.' }\n    ];\n\n    const tags = ['ANXIETY','DEPRESSION','SELF ESTEEM','TRAUMA','FAMILY ISSUES','COPING SKILLS','MINDFULNESS','CBT THERAPY','EMDR THERAPY','LIFE TRANSITIONS','OCD THERAPY','SOCIAL ANXIETY','MEN\\u2019S ISSUES','BIPOLAR DISORDER','DOMESTIC ABUSE','PHOBIAS','INTEGRATION','PORN ADDICTION','ADHD','BURNOUT ISSUES','DBT THERAPY','ANGER MANAGEMENT','PTSD','WORK STRESS','CAREER COUNSELING','GRIEF','MARRIAGE COUNSELING','EATING DISORDERS','SPIRITUALITY','YOUNG ADULTS','LGBTQ','SUBSTANCE ABUSE','SEXUAL ABUSE','PARENTING','SOMATIC THERAPY','WOMEN\\u2019S ISSUES'];\n\n    const supporting = [\n      { tag: 'All clinicians Medicare-enrolled', body: 'Every MMHC therapist is enrolled in Medicare with an active NPI number and bills Medicare directly, so you do not submit paperwork or pay upfront and wait for reimbursement.' },\n      { tag: 'Senior-friendly telehealth', body: 'One click to join, no app to download, works in any browser. Phone support to test your setup before the first session.' },\n      { tag: 'Not the right fit? We rematch you', body: 'If your first therapist is not right, we match you with another Medicare-enrolled clinician on our team without restarting your benefits verification. The fit between you and your therapist is one of the most consistent predictors of whether therapy works (Fl\\u00FCckiger et al., 2018, a meta-analysis of 295 studies), so we make switching easy rather than something you have to start over for.' },\n      { tag: 'Evening and weekend availability', body: 'Sessions outside business hours, so therapy fits around your life and your caregivers\\u2019 schedules.' },\n      { tag: 'Built for New York', body: 'We are a New York practice serving New Yorkers only, not a national directory. That means we know the New York Medigap rules, the local plans, and how coverage actually works here.' }\n    ];\n\n    const steps = [\n      { n: '1', h: 'Verify your coverage.', b: 'Get in touch with your Medicare card on hand. We confirm your plan, calculate your exact cost, and confirm no referral is needed.' },\n      { n: '2', h: 'Get matched.', b: 'We match you to a Medicare-enrolled therapist based on what you are dealing with and your scheduling needs.' },\n      { n: '3', h: 'Schedule your first session.', b: 'Book by phone or online. You receive a confirmation, a reminder, and a one-click telehealth link.' },\n      { n: '4', h: 'Join your session.', b: 'Click the link, no download required. We file your Medicare claim automatically.' }\n    ];\n\n    const docs = [\n      { id: 'medicare-therapist-1', name: '[Therapist name]', cred: 'LMHC \\u00B7 NY License #\\u2014 \\u00B7 Medicare-enrolled', s1: 'Specialty', s2: 'Specialty' },\n      { id: 'medicare-therapist-2', name: '[Therapist name]', cred: 'LCSW \\u00B7 NY License #\\u2014 \\u00B7 Medicare-enrolled', s1: 'Specialty', s2: 'Specialty' },\n      { id: 'medicare-therapist-3', name: '[Therapist name]', cred: 'LMHC \\u00B7 NY License #\\u2014 \\u00B7 Medicare-enrolled', s1: 'Specialty', s2: 'Specialty' }\n    ];\n\n    const askMethods = [\n      'Call Medicare directly at 1-800-MEDICARE (1-800-633-4227), 24 hours a day, 7 days a week.',\n      'Log into your account at medicare.gov.',\n      'Contact New York\\u2019s free Medicare counseling program, HIICAP (Health Insurance Information, Counseling and Assistance Program), through the NY State Office for the Aging.'\n    ];\n\n    const askqRaw = [\n      'Is outpatient psychotherapy covered under my plan, and what is my cost after the Part B deductible?',\n      'Have I met my $283 Part B deductible for the year yet?',\n      'Do I have a Medigap (Supplement) plan, and does it cover my Part B coinsurance?',\n      'Is telehealth therapy from home covered at the same rate as in-person? (For Medicare behavioral health, yes.)',\n      'Do I need a referral or prior authorization? (For Original Medicare, no.)'\n    ];\n    const askq = askqRaw.map((s, i) => {\n      const m = s.match(/^(.*\\?)\\s+(\\(.*\\))$/);\n      return { n: String(i + 1), q: m ? m[1] : s, hint: m ? m[2] : '', hasHint: !!m };\n    });\n\n    const testimonials = [\n      { name: 'Alethia Millner', t: 'Nothing but a truly wonderful experience. Manhattan Mental Health Counseling provided me with a wonderful therapist and listened and supported me throughout my healing journey for over a year.' },\n      { name: 'Lauren Mirsky', t: 'I was able to be paired with a therapist I actually connected with on the first try, which is pretty miraculous. Stephanie is absolutely wonderful.' },\n      { name: 'Aramelis Fernandez', t: 'I\\u2019ve been a client at this practice for over a year now and it\\u2019s been life-changing. The intake was seamless and my therapist is outstanding.' },\n      { name: 'Perla Lopez', t: 'Over 2 years with my therapist and she\\u2019s a 10/10. She has helped me a lot with all of my issues. She\\u2019s very accommodating.' },\n      { name: 'Alana Hernandez', t: 'I have been receiving therapy sessions from MMHC since 2020 at the height of the pandemic. Experiencing anxiety in a new light scared me the most. I needed to get help.' },\n      { name: 'Nicole Garcia', t: 'So far I have been liking the experience of having a therapist and meeting online. It makes it more convenient for both of us. I\\u2019m glad I heard about Manhattan Mental Health.' }\n    ];\n    const t = ((this.state.t % testimonials.length) + testimonials.length) % testimonials.length;\n\n    const faqData = [\n      ['Is therapy covered by Medicare Part B or Part A?', 'Part B. Outpatient therapy, the kind you attend from home or an office, falls under Medicare Part B. Part A is for inpatient hospital care.'],\n      ['How do I find a Medicare therapist near me?', 'Because Medicare covers behavioral health telehealth from your home anywhere in New York State, you are not limited to therapists in your neighborhood. Any Medicare-enrolled therapist licensed in New York can see you by video, which widens your options well beyond what is within driving distance.'],\n      ['What is the difference between Medicare and Medicaid for therapy?', 'Medicare is federal coverage tied to age 65+ or disability; Medicaid is income-based. If you have both (dual-eligible), Medicaid typically covers what Medicare leaves you, so you usually pay $0. This page covers Medicare; we confirm how both work together for you when you verify your benefits.'],\n      ['Does Medicare cover couples or marriage therapy?', 'It can, when it is medically necessary to treat a diagnosed condition. If one partner has a condition like depression or anxiety and the relationship work is part of treating it, Medicare Part B covers family psychotherapy with the patient present. Medicare does not cover counseling for general relationship improvement with no diagnosis. Since 2024, licensed mental health counselors and marriage and family therapists can bill Medicare directly.'],\n      ['Does Medicare require a referral for therapy?', 'No. Original Medicare lets you see a Medicare-enrolled therapist without a referral.'],\n      ['What is a Medicare-enrolled therapist?', 'A Medicare-enrolled therapist is a licensed mental health provider who has registered with Medicare and agreed to accept Medicare\\u2019s approved rates as payment. When you see one, Medicare is billed directly and you pay only your coinsurance, or nothing if you have Medigap or Medicaid. You can check any provider\\u2019s Medicare enrollment in the federal NPPES registry at nppes.cms.hhs.gov. All MMHC therapists are Medicare-enrolled and bill Medicare directly.'],\n      ['Can I use Medicare for therapy if I am under 65?', 'Yes. If you qualify for Medicare through a disability, end-stage renal disease, or ALS, your coverage for outpatient therapy works the same as for adults 65 and older: Part B covers it with no session limits when medically necessary. New York is also one of the few states whose Medigap protections extend to under-65 beneficiaries, so the same year-round, community-rated Medigap access applies to you.'],\n      ['What happens at a Medicare therapy session?', 'The same as any therapy session. You meet your therapist by secure video, talk through what brought you in, and work toward goals you set together. The first session is mostly getting to know your history and what you want help with. Sessions are confidential and covered by Medicare the same as in-person visits.'],\n      ['How many therapy sessions does Medicare cover per year?', 'There is no preset annual limit. Coverage continues as long as your therapist documents that treatment is medically necessary.'],\n      ['What is the Medicare Part B deductible for therapy in 2026?', '$283. It applies to all Part B services, not therapy alone. After you meet it, Part B pays 80% of the approved amount and you pay 20%, unless you have a supplement that covers the coinsurance.'],\n      ['Why might my first sessions of the year cost more than $27?', 'Until you meet the $283 Part B deductible for the year, you pay the full Medicare-approved amount per session, about $137 for a 60-minute session in NYC. Once the deductible is met, your cost drops to the standard 20% coinsurance, about $27, or $0 if you have Medigap or Medicaid.'],\n      ['Does Medigap cover therapy costs?', 'Yes. Medigap Plan G covers the 20% Part B coinsurance after the deductible, so your per-session cost is $0. Plan N covers the coinsurance but may charge a small copay.'],\n      ['Can I switch to Medigap to get $0 therapy sessions in New York?', 'Yes, and New York makes this easier than almost anywhere. New York is one of only a few states that require Medigap insurers to sell you a policy year-round, regardless of your age or health. If you are on Part B alone today and want to get to $0 per session, you are not locked out of adding a Medigap plan. (A pre-existing condition waiting period of up to six months can apply if you did not have prior continuous coverage.)'],\n      ['Does Medicare cover therapy for depression, anxiety, or PTSD?', 'Yes. Medicare Part B covers therapy for diagnosed mental health conditions including depression, anxiety, and PTSD, with no annual session limit when treatment is medically necessary. These are among the most common conditions our therapists treat in older adults.'],\n      ['Does Medicare cover specific therapy approaches like CBT or EMDR?', 'Yes. Medicare covers psychotherapy based on medical necessity, not the specific method. Evidence-based approaches including CBT, EMDR, and others are covered when delivered by a Medicare-enrolled provider to treat a diagnosed condition. Your therapist matches the approach to what you are working on.'],\n      ['Does Medicare cover therapy if I have a pre-existing mental health condition?', 'Yes. Original Medicare has no pre-existing condition exclusion and has covered pre-existing conditions since it began, with no medical underwriting. A history of depression, anxiety, or any other diagnosis does not disqualify you and does not raise your cost; Part B covers your therapy the same as any other medically necessary care. The only place a pre-existing rule can appear is a Medigap supplement, which may apply a waiting period of up to six months if you did not have prior continuous coverage (see the New York Medigap section above). That affects what the supplement pays toward your coinsurance, not whether Medicare covers your therapy.'],\n      ['Does Medicare cover online therapy?', 'Yes. Behavioral health telehealth from home is covered with no geographic restriction, at the same rate as in-person. No referral is required, and no in-person visit is needed to start.'],\n      ['Can I see a therapist outside New York with Medicare?', 'Original Medicare works with any Medicare-enrolled provider nationwide. MMHC serves New York State.'],\n      ['Does Medicare cover therapy for grief after losing a spouse?', 'Yes. Grief and bereavement therapy are covered Medicare services when provided by a Medicare-enrolled therapist.'],\n      ['Can my adult children join my sessions?', 'Yes, with your consent. Family therapy with the patient present is a covered Medicare benefit.']\n    ];\n    const open = this.state.faq;\n    const faqs = faqData.map(([q, a], i) => ({\n      q, a,\n      open: i === open,\n      icon: i === open ? '\\u00D7' : '+',\n      circleBg: i === open ? '#FFFFFF' : '#7DC242',\n      iconColor: i === open ? '#2F5616' : '#1E3A10',\n      toggle: () => this.setState({ faq: this.state.faq === i ? -1 : i })\n    }));\n\n    const refs = [\n      { t: 'Centers for Medicare & Medicaid Services. 2026 Medicare Parts A & B Premiums and Deductibles ($283 Part B deductible).', url: 'https://www.cms.gov/newsroom/fact-sheets/2026-medicare-parts-b-premiums-deductibles' },\n      { t: 'Telehealth.HHS.gov. Telehealth policy updates (behavioral health telehealth from home permanent; in-person visit requirement waived through Dec 31, 2027).', url: 'https://telehealth.hhs.gov/providers/telehealth-policy/telehealth-policy-updates' },\n      { t: 'Centers for Medicare & Medicaid Services. Calendar Year 2026 Physician Fee Schedule Final Rule.', url: 'https://www.cms.gov/medicare/payment/fee-schedules/physician' },\n      { t: 'Medicare.gov. Mental health care (outpatient).', url: 'https://www.medicare.gov/coverage/mental-health-care-outpatient' },\n      { t: 'KFF. Key Facts About Medigap Enrollment and Premiums (NY among the few states with continuous guaranteed-issue, community-rated Medigap).', url: 'https://www.kff.org/medicare/key-facts-about-medigap-enrollment-and-premiums-for-medicare-beneficiaries/' },\n      { t: 'New York State Department of Financial Services. Medicare Supplement (Medigap) Insurance (year-round guaranteed issue, community rating).', url: 'https://www.dfs.ny.gov' },\n      { t: 'Fl\\u00FCckiger, C., Del Re, A. C., Wampold, B. E., & Horvath, A. O. (2018). The alliance in adult psychotherapy: A meta-analytic synthesis. Psychotherapy, 55(4), 316-340.', url: 'https://doi.org/10.1037/pst0000172' }\n    ];\n\n    return {\n      quick, payDepends, medigapPoints, tags, supporting, steps, docs, askMethods, askq, faqs, refs,\n      costRange, therapistCount, showChrome,\n      tCards: [0, 1, 2].map(k => testimonials[(t + k) % testimonials.length]),\n      tPos: (t + 1) + ' / ' + testimonials.length,\n      prevT: () => this.setState({ t: this.state.t - 1 }),\n      nextT: () => this.setState({ t: this.state.t + 1 })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"_standalone_src.dc"}
  </script>
