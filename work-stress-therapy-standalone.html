color:#3D6B1E;margin-bottom:16px\">Online therapy for work stress · New York State<\u002Fdiv>\n      <h1 style=\"font-family:'PT Serif',serif;font-size:clamp(33px,4.6vw,46px);line-height:1.07;font-weight:700;margin:0 0 16px;color:#1F3414;letter-spacing:-.015em;text-wrap:pretty\">When the workday ends but your mind won't.<\u002Fh1>\n      <p style=\"font-family:'DM Sans',sans-serif;font-size:clamp(16px,1.5vw,17px);line-height:1.65;color:#3F4D34;margin:0 0 14px;max-width:540px\">Work stress therapy in NYC — online and available this week. We work with New Yorkers whose jobs have started showing up in their sleep, focus, mood, and body.<\u002Fp>\n      <p style=\"font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;color:#5A6850;margin:0 0 28px;max-width:520px\">Secure video sessions, same-week openings, available anywhere in New York State.<\u002Fp>\n      <a href=\"#contact-now\" onclick=\"{{ scrollTo }}\" style=\"display:inline-block;font-family:'DM Sans',sans-serif;text-decoration:none;background:#8FD15F;color:#163209;font-size:15.5px;font-weight:700;border-radius:99px;padding:16px 36px;box-shadow:0 12px 26px rgba(61,107,30,.22)\" style-hover=\"background:#7FC24D\">Start Therapy Now<\u002Fa>\n    <\u002Fdiv>\n    <!-- Cost card -->\n    <sc-if value=\"{{ showCostCard }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:relative;background:#FFFFFF;border-radius:20px;box-shadow:0 20px 44px rgba(35,40,46,.16);overflow:hidden;border:1px solid #E2EDD6\">\n      <div style=\"background:#2F5616;color:#FFFFFF;font-family:'DM Sans',sans-serif;padding:18px 24px\">\n        <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#AFD589\">What it costs<\u002Fdiv>\n        <div style=\"font-family:'PT Serif',serif;font-size:20px;font-weight:700;margin-top:3px\">Most clients pay $0–$25 a session<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'DM Sans',sans-serif\">\n        <div style=\"display:flex;justify-content:space-between;gap:14px;padding:15px 24px;border-bottom:1px solid #EEF2E8\">\n          <div style=\"font-size:14px;font-weight:600;color:#26301D\">With in-network insurance<\u002Fdiv>\n          <div style=\"font-size:14px;font-weight:700;color:#2F5616;text-align:right;flex:0 0 auto\">$0–$25 / session<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;gap:14px;padding:13px 24px;border-bottom:1px solid #EEF2E8\">\n          <div style=\"font-size:13px;font-weight:500;color:#5A6850\">Aetna · Cigna · UnitedHealthcare · Healthfirst · Oscar<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;gap:14px;padding:15px 24px\">\n          <div style=\"font-size:14px;font-weight:600;color:#26301D\">Self-pay<\u002Fdiv>\n          <div style=\"font-size:14px;font-weight:700;color:#2F5616;text-align:right;flex:0 0 auto\">$175 / session<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'DM Sans',sans-serif;background:#F0F8E6;border-top:1px solid #E2EDD6;padding:14px 24px;font-size:12.5px;line-height:1.55;color:#4A5740\">We confirm your exact cost before your first session — so nothing surprises you later.<\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <!-- Stats band overlapping -->\n  <div style=\"position:relative;z-index:2;max-width:1080px;margin:0 auto;padding:0 clamp(20px,5vw,36px) clamp(40px,5vw,54px)\">\n    <div style=\"background:#23391A;border-radius:18px;box-shadow:0 16px 42px rgba(35,40,46,.18);display:flex;flex-wrap:wrap;font-family:'DM Sans',sans-serif;overflow:hidden;color:#FFFFFF\">\n      <div style=\"flex:1 1 200px;padding:26px 16px;text-align:center;border-right:1px solid rgba(255,255,255,.12)\">\n        <div style=\"font-size:clamp(28px,3.4vw,36px);font-weight:700;letter-spacing:-.02em\">$0–25<\u002Fdiv>\n        <div style=\"font-size:13px;color:#C9DDB6;margin-top:6px\">average copay, in-network<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 200px;padding:26px 16px;text-align:center;border-right:1px solid rgba(255,255,255,.12)\">\n        <div style=\"font-size:clamp(28px,3.4vw,36px);font-weight:700;letter-spacing:-.02em\">Same week<\u002Fdiv>\n        <div style=\"font-size:13px;color:#C9DDB6;margin-top:6px\">to your first session<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 200px;padding:26px 16px;text-align:center\">\n        <div style=\"font-size:clamp(28px,3.4vw,36px);font-weight:700;letter-spacing:-.02em\">5,000+<\u002Fdiv>\n        <div style=\"font-size:13px;color:#C9DDB6;margin-top:6px\">clients since 2014 · 4.0 on Google<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== INTRO ===== -->\n<div style=\"max-width:760px;margin:0 auto;padding:clamp(44px,6vw,60px) 24px 0\">\n  <p style=\"font-family:'DM Sans',sans-serif;font-size:18px;line-height:1.75;margin:0;color:#33402A\">Manhattan Mental Health Counseling works with New Yorkers whose jobs have started showing up in their sleep, focus, mood, and body. We provide 100% online therapy across New York State with 91+ therapists, in-network with major insurers, and most clients pay $0–$25 per session. We verify your exact cost before your first session, and you can often start the same week.<\u002Fp>\n<\u002Fdiv>\n\n<!-- ===== QUICK ANSWERS ===== -->\n<div id=\"quick-answers\" style=\"max-width:920px;margin:0 auto;padding:clamp(44px,6vw,58px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3D6B1E\">Start here<\u002Fdiv>\n  <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(26px,3.2vw,32px);font-weight:700;margin:10px 0 22px;color:#2F5616;letter-spacing:-.01em\">Quick answers about work stress therapy<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px\">\n    <div style=\"display:flex;gap:16px;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px 24px\">\n      <span style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center\">1<\u002Fspan>\n      <div><div style=\"font-size:16px;font-weight:700;color:#2F5616;line-height:1.35\">Can therapy actually help with work stress?<\u002Fdiv><div style=\"font-size:14.5px;line-height:1.6;color:#41513A;margin-top:9px\"><strong style=\"color:#2F5616\">Yes.<\u002Fstrong> It helps you understand what is driving the pressure, catch your stress response earlier, and build skills to work and rest without staying in a constant state of overdrive.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:16px;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px 24px\">\n      <span style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center\">2<\u002Fspan>\n      <div><div style=\"font-size:16px;font-weight:700;color:#2F5616;line-height:1.35\">Do I need to be in crisis to start?<\u002Fdiv><div style=\"font-size:14.5px;line-height:1.6;color:#41513A;margin-top:9px\"><strong style=\"color:#2F5616\">No.<\u002Fstrong> Most people start before a crisis, when stress is persistent, sleep and focus are slipping, or their usual ways of coping have stopped working.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:16px;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px 24px\">\n      <span style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center\">3<\u002Fspan>\n      <div><div style=\"font-size:16px;font-weight:700;color:#2F5616;line-height:1.35\">How much does it cost with insurance?<\u002Fdiv><div style=\"font-size:14.5px;line-height:1.6;color:#41513A;margin-top:9px\">Most clients pay between $0 and $25 per session in-network. That is your copay — the flat amount you owe per visit — and we verify your exact figure before your first session.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:16px;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px 24px\">\n      <span style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center\">4<\u002Fspan>\n      <div><div style=\"font-size:16px;font-weight:700;color:#2F5616;line-height:1.35\">How fast can I start?<\u002Fdiv><div style=\"font-size:14.5px;line-height:1.6;color:#41513A;margin-top:9px\">Most clients have their first session within the week. There is no in-network waitlist.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"grid-column:1 / -1;display:flex;gap:16px;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px 24px\">\n      <span style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center\">5<\u002Fspan>\n      <div><div style=\"font-size:16px;font-weight:700;color:#2F5616;line-height:1.35\">Is online therapy as effective for work stress?<\u002Fdiv><div style=\"font-size:14.5px;line-height:1.6;color:#41513A;margin-top:9px;max-width:760px\"><strong style=\"color:#2F5616\">Yes.<\u002Fstrong> Research on the working relationship between client and therapist finds online therapy works about as well as in-person, and it removes the commute that makes a packed work schedule hard to fit therapy into.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== UNDERSTANDING ===== -->\n<div style=\"max-width:980px;margin:0 auto;padding:clamp(48px,6vw,62px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3D6B1E\">The basics<\u002Fdiv>\n  <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(26px,3.2vw,32px);font-weight:700;margin:10px 0 16px;color:#2F5616;letter-spacing:-.01em\">Understanding work stress<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(24px,3vw,40px);align-items:center\">\n    <div>\n      <p style=\"font-size:16px;line-height:1.7;color:#3A4730;margin-bottom:14px\">Work stress becomes a clinical concern when it stops switching off. You can still be hitting deadlines and showing up for everyone while privately running anxious, exhausted, irritable, or close to checked-out. Work stress therapy is a form of psychotherapy focused on identifying your stressors, understanding how stress shows up in your thoughts and body, and building tools to bring the pressure down before it turns chronic.<\u002Fp>\n      <p style=\"font-size:16px;line-height:1.7;color:#3A4730;margin-bottom:14px\">Long hours, high-stakes decisions, unclear expectations, difficult managers or colleagues, financial pressure, and the simple fact of being \"always on\" all feed it — and being competent does not make you immune.<\u002Fp>\n      <p style=\"font-size:16px;line-height:1.7;color:#3A4730\">Therapy for work stress is about learning to function, work, relate, and rest without living in fight-or-flight. You can keep your standards and your ambition while changing the part of the pattern that keeps the stress running after the laptop is closed.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#2F5616;color:#FFFFFF;border-radius:20px;padding:clamp(26px,3vw,38px);text-align:center\">\n      <div style=\"font-family:'PT Serif',serif;font-size:clamp(58px,8vw,84px);line-height:1;font-weight:700\">77%<\u002Fdiv>\n      <p style=\"font-size:15.5px;line-height:1.55;color:#CBE0B4;margin:10px 0 16px\">of U.S. workers reported work-related stress in the past month — and more than half reported it affecting their health.<a href=\"#references\" onclick=\"{{ scrollTo }}\" style=\"text-decoration:none;color:#9CD15C;font-size:12px;vertical-align:super\">1<\u002Fa><\u002Fp>\n      <div style=\"font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:#8FB07A;border-top:1px solid rgba(255,255,255,.16);padding-top:14px\">APA · Work in America Survey, 2023<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== CTA BAND ===== -->\n<div style=\"max-width:1080px;margin:clamp(48px,6vw,62px) auto 0;padding:0 clamp(20px,5vw,36px)\">\n  <div style=\"background:linear-gradient(180deg,#EFF7E7,#E4F0D8);border:1px solid #DCE8CC;border-radius:20px;padding:clamp(30px,4vw,44px);text-align:center;font-family:'DM Sans',sans-serif\">\n    <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(24px,3vw,32px);font-weight:700;margin:0 0 10px;color:#2F5616\">$0 to $25 per session with in-network insurance<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.6;color:#3F4D34;max-width:640px;margin:0 auto 24px\">We are in-network with Aetna, Cigna, UnitedHealthcare, Healthfirst, Oscar, and more — and we confirm your exact cost before session one.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:12px;justify-content:center\">\n      <a href=\"#contact-now\" onclick=\"{{ scrollTo }}\" style=\"text-decoration:none;background:#8FD15F;color:#163209;font-size:15px;font-weight:700;border-radius:99px;padding:15px 30px\" style-hover=\"background:#7FC24D\">Start Therapy Now<\u002Fa>\n      <a href=\"tel:2129608626\" style=\"text-decoration:none;background:#FFFFFF;border:1px solid #C7D6B6;color:#2F5616;font-size:15px;font-weight:700;border-radius:99px;padding:14px 26px\">📞 212-960-8626<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== DOES THERAPY HELP ===== -->\n<div style=\"max-width:820px;margin:0 auto;padding:clamp(48px,6vw,62px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3D6B1E\">Why it works<\u002Fdiv>\n  <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(26px,3.2vw,32px);font-weight:700;margin:10px 0 16px;color:#2F5616;letter-spacing:-.01em\">Does therapy actually help with work stress?<\u002Fh2>\n  <p style=\"font-size:16.5px;line-height:1.72;color:#3A4730;margin-bottom:16px\"><strong style=\"color:#2F5616\">Yes.<\u002Fstrong> Telling yourself to relax rarely touches work stress, because effort was never the bottleneck. What keeps it going is the pattern: the rumination at 11pm, the tightening before a Monday, the inability to be present at dinner. Therapy works on that pattern directly.<\u002Fp>\n  <p style=\"font-size:16.5px;line-height:1.72;color:#3A4730\">In sessions you map what actually sets your stress off, learn to notice the physical signs earlier, and practice responses that hold up under real pressure instead of in theory. For some clients that means tools for a high-stakes role. For others it means addressing the perfectionism, boundary problems, people-pleasing, or anxiety underneath the work stress. The aim is a working rhythm where the job can be demanding without consuming you.<\u002Fp>\n<\u002Fdiv>\n\n<!-- ===== WHY MMHC ===== -->\n<div style=\"max-width:1000px;margin:0 auto;padding:clamp(48px,6vw,62px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3D6B1E\">The difference<\u002Fdiv>\n  <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(26px,3.2vw,32px);font-weight:700;margin:10px 0 16px;color:#2F5616;letter-spacing:-.01em\">Why MMHC's approach to work stress works<\u002Fh2>\n  <div style=\"max-width:760px;margin-bottom:30px\">\n    <p style=\"font-size:16px;line-height:1.7;color:#3A4730;margin-bottom:14px\">You get matched to a therapist who actually works with high-pressure professionals, usually within the week — and if the fit is not right you switch without starting your intake over.<\u002Fp>\n    <p style=\"font-size:16px;line-height:1.7;color:#3A4730;margin-bottom:14px\">That last part matters more than it sounds. The single most reliable predictor of whether therapy works is the strength of the working relationship between you and your therapist, across a meta-analysis of 295 studies and more than 30,000 clients.<a href=\"#references\" onclick=\"{{ scrollTo }}\" style=\"text-decoration:none;color:#3568A8;font-size:12px;vertical-align:super\">2<\u002Fa> Most practices make a bad match your problem to solve by starting again from scratch somewhere else. With <strong style=\"color:#2F5616\">Seamless Rematch<\u002Fstrong>, you move to another MMHC clinician and keep your history — so a wrong fit costs you a conversation, not your momentum.<\u002Fp>\n    <p style=\"font-size:16px;line-height:1.7;color:#3A4730\">With 91+ therapists across the practice, you are matched to someone who works with the specific shape of your stress — not to whoever happens to be free — and where it matters to you, someone who understands your background and identity.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;margin-bottom:30px\">\n    <div style=\"background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px\"><div style=\"font-size:16px;font-weight:700;color:#2F5616;margin-bottom:7px\">In-network, no separate queue<\u002Fdiv><p style=\"font-size:14px;line-height:1.55;color:#41513A\">Clients using insurance wait no longer than self-pay clients.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px\"><div style=\"font-size:16px;font-weight:700;color:#2F5616;margin-bottom:7px\">Coverage verified first<\u002Fdiv><p style=\"font-size:14px;line-height:1.55;color:#41513A\">We confirm your copay with your carrier before session one, so cost is settled before you start.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px\"><div style=\"font-size:16px;font-weight:700;color:#2F5616;margin-bottom:7px\">Outcome-tracked care<\u002Fdiv><p style=\"font-size:14px;line-height:1.55;color:#41513A\">Standardized check-ins (PHQ-9, GAD-7) measure whether the work is actually moving — instead of guessing.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:22px\"><div style=\"font-size:16px;font-weight:700;color:#2F5616;margin-bottom:7px\">Evenings &amp; weekends<\u002Fdiv><p style=\"font-size:14px;line-height:1.55;color:#41513A\">Built for people whose calendars do not clear during business hours.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-wrap:wrap;gap:12px;align-items:center\">\n    <a href=\"#contact-now\" onclick=\"{{ scrollTo }}\" style=\"text-decoration:none;background:#8FD15F;color:#163209;font-size:15px;font-weight:700;border-radius:99px;padding:15px 30px\" style-hover=\"background:#7FC24D\">Start Therapy Now<\u002Fa>\n    <a href=\"tel:2129608626\" style=\"text-decoration:none;background:#FFFFFF;border:1px solid #C7D6B6;color:#2F5616;font-size:15px;font-weight:700;border-radius:99px;padding:14px 26px\">📞 212-960-8626<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== WHAT WORK STRESS DOES ===== -->\n<div style=\"max-width:980px;margin:0 auto;padding:clamp(48px,6vw,62px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3D6B1E\">Know the signs<\u002Fdiv>\n  <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(26px,3.2vw,32px);font-weight:700;margin:10px 0 14px;color:#2F5616;letter-spacing:-.01em\">What work stress does to you<\u002Fh2>\n  <p style=\"font-size:16px;line-height:1.7;color:#3A4730;max-width:720px;margin-bottom:26px\">You do not have to wait until you are falling apart to start. Counseling helps when stress is persistent, hard to control, or showing up in your body, mood, work, or relationships. Common signs:<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:28px\">\n    <div style=\"display:flex;gap:12px;align-items:flex-start;background:#FFFFFF;border:1px solid #E3E5DE;border-radius:13px;padding:16px 18px\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2F5616\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;line-height:1.5;color:#3A4730\">Worrying about work after the day ends, or Sunday-night dread before it starts<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;align-items:flex-start;background:#FFFFFF;border:1px solid #E3E5DE;border-radius:13px;padding:16px 18px\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2F5616\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;line-height:1.5;color:#3A4730\">Trouble sleeping because your mind will not slow down<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;align-items:flex-start;background:#FFFFFF;border:1px solid #E3E5DE;border-radius:13px;padding:16px 18px\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2F5616\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;line-height:1.5;color:#3A4730\">Tension headaches, stomach discomfort, chest tightness, or fatigue that rest does not fix<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;align-items:flex-start;background:#FFFFFF;border:1px solid #E3E5DE;border-radius:13px;padding:16px 18px\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2F5616\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;line-height:1.5;color:#3A4730\">Irritability, emotional reactivity, or feeling easily overwhelmed<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;align-items:flex-start;background:#FFFFFF;border:1px solid #E3E5DE;border-radius:13px;padding:16px 18px\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2F5616\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;line-height:1.5;color:#3A4730\">Difficulty concentrating or making decisions<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;align-items:flex-start;background:#FFFFFF;border:1px solid #E3E5DE;border-radius:13px;padding:16px 18px\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2F5616\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;line-height:1.5;color:#3A4730\">Avoidance, procrastination, or perfectionism that makes routine tasks feel high-stakes<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;align-items:flex-start;background:#FFFFFF;border:1px solid #E3E5DE;border-radius:13px;padding:16px 18px\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2F5616\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;line-height:1.5;color:#3A4730\">Using alcohol, food, screens, or more work to disconnect<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;align-items:flex-start;background:#FFFFFF;border:1px solid #E3E5DE;border-radius:13px;padding:16px 18px\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2F5616\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;line-height:1.5;color:#3A4730\">Feeling cynical, numb, or detached from work and the people in your life<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:16px;line-height:1.7;color:#3A4730;max-width:760px\">Stress lives in the body as much as the mind, and when it stays constant the physical and emotional toll builds. Addressing it earlier is easier than reversing a pattern that has had a year to set. If several of these feel familiar, therapy can help you understand your stress response and build steadier ways to regulate it.<\u002Fp>\n<\u002Fdiv>\n\n<!-- ===== WHAT DRIVES + BURNOUT ===== -->\n<div style=\"max-width:1000px;margin:0 auto;padding:clamp(48px,6vw,62px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px\">\n    <div style=\"background:#FFFFFF;border:1px solid #E3E5DE;border-radius:18px;padding:clamp(24px,3vw,34px);box-shadow:0 8px 28px rgba(35,40,46,.05)\">\n      <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(22px,2.6vw,28px);font-weight:700;margin:0 0 14px;color:#2F5616\">What drives work stress<\u002Fh2>\n      <p style=\"font-size:15.5px;line-height:1.65;color:#3A4730;margin-bottom:13px\">The first step in changing how you cope is naming what is actually driving the stress. For many people it is overload: unrealistic goals, long hours, or thin support from managers and colleagues. For executives, founders, managers, physicians, attorneys, and other professionals, the pressure can feel built into the role — and the work becomes less about removing stress and more about functioning with clarity, boundaries, and sustainable habits inside it.<\u002Fp>\n      <p style=\"font-size:15.5px;line-height:1.65;color:#3A4730\">For others the source is interpersonal: a clash with a supervisor, a difficult team, bullying, exclusion, or instability. And often it is internal — perfectionism, imposter syndrome, or insecurity that turns ordinary tasks high-stakes. A skilled therapist helps you find the real root. If your stress comes with leading at a senior level, board-level pressure, or decision fatigue, <a class=\"wslink\" href=\"https://manhattanmentalhealthcounseling.com/executive-therapists-guide-nyc/\">executive therapy<\u002Fa> addresses that directly.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:18px;padding:clamp(24px,3vw,34px)\">\n      <div style=\"font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3D6B1E;margin-bottom:10px\">When it goes further<\u002Fdiv>\n      <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(22px,2.6vw,28px);font-weight:700;margin:0 0 14px;color:#2F5616\">When work stress becomes burnout<\u002Fh2>\n      <p style=\"font-size:15.5px;line-height:1.65;color:#3A4730;margin-bottom:13px\">Burnout is more than being tired after a hard week. It tends to develop after prolonged stress — when you feel emotionally overextended, under-supported, or unable to recover — and it shows up as exhaustion, cynicism, a shrinking sense of accomplishment, and physical depletion that rest does not resolve. The traits that help you succeed — drive, conscientiousness, the habit of pushing through — can keep burnout running by making it hard to rest, set limits, or ask for help.<\u002Fp>\n      <p style=\"font-size:15.5px;line-height:1.65;color:#3A4730\">Therapy can catch the early signs and rebuild a healthier relationship with work, responsibility, and rest. If burnout is already affecting how you function, <a class=\"wslink\" href=\"https://manhattanmentalhealthcounseling.com/burnout-therapy/\">burnout therapy<\u002Fa> goes deeper on it.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== HOW THERAPY WORKS (table) ===== -->\n<div style=\"max-width:980px;margin:0 auto;padding:clamp(48px,6vw,62px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3D6B1E\">The methods<\u002Fdiv>\n  <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(26px,3.2vw,32px);font-weight:700;margin:10px 0 14px;color:#2F5616;letter-spacing:-.01em\">How therapy for work stress works<\u002Fh2>\n  <p style=\"font-size:16px;line-height:1.7;color:#3A4730;max-width:720px;margin-bottom:24px\">Your therapist draws from several evidence-informed approaches, matched to your symptoms, history, and goals rather than applied one-size-fits-all.<\u002Fp>\n  <div style=\"background:#FFFFFF;border:1px solid #E3E5DE;border-radius:16px;overflow:hidden;box-shadow:0 8px 28px rgba(35,40,46,.05)\">\n    <table style=\"width:100%;border-collapse:collapse;font-size:14.5px\">\n      <thead><tr style=\"background:#2F5616;color:#FFFFFF\"><th style=\"text-align:left;padding:15px 22px;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;width:38%\">Approach<\u002Fth><th style=\"text-align:left;padding:15px 22px;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase\">What it targets<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;font-weight:700;color:#2F5616;vertical-align:top\">CBT — cognitive behavioral therapy<\u002Ftd><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;color:#41513A;line-height:1.55\">The thought patterns that turn pressure into spirals: catastrophizing, all-or-nothing thinking, \"I should be able to handle this\"<\u002Ftd><\u002Ftr>\n        <tr style=\"background:#F7FAF1\"><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;font-weight:700;color:#2F5616;vertical-align:top\">ACT — acceptance &amp; commitment therapy<\u002Ftd><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;color:#41513A;line-height:1.55\">Acting on your values instead of avoidance, when the stress cannot be fully removed<\u002Ftd><\u002Ftr>\n        <tr><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;font-weight:700;color:#2F5616;vertical-align:top\">DBT-informed skills<\u002Ftd><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;color:#41513A;line-height:1.55\">Emotion regulation, distress tolerance, and staying steady in moments of overwhelm<\u002Ftd><\u002Ftr>\n        <tr style=\"background:#F7FAF1\"><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;font-weight:700;color:#2F5616;vertical-align:top\">Mindfulness-based skills<\u002Ftd><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;color:#41513A;line-height:1.55\">Catching the stress response earlier and settling your nervous system in real time<\u002Ftd><\u002Ftr>\n        <tr><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;font-weight:700;color:#2F5616;vertical-align:top\">Somatic, body-based work<\u002Ftd><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;color:#41513A;line-height:1.55\">The physical side of stress: tension, shallow breathing, the always-on feeling, fight-or-flight<\u002Ftd><\u002Ftr>\n        <tr style=\"background:#F7FAF1\"><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;font-weight:700;color:#2F5616;vertical-align:top\">Psychodynamic &amp; relational work<\u002Ftd><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;color:#41513A;line-height:1.55\">The patterns underneath the stress: self-criticism, people-pleasing, old relationship dynamics<\u002Ftd><\u002Ftr>\n        <tr><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;font-weight:700;color:#2F5616;vertical-align:top\">Trauma-informed care<\u002Ftd><td style=\"padding:16px 22px;border-top:1px solid #ECEFE3;color:#41513A;line-height:1.55\">How past experience shapes your current stress response, when that is part of the picture<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n  <p style=\"font-size:16px;line-height:1.7;color:#3A4730;max-width:760px;margin-top:24px\">Across approaches, the work moves you from reacting automatically to responding on purpose: understanding your triggers, reading the physical signs sooner, quieting rumination, setting boundaries that hold, and building work habits you can actually sustain. The tools are realistic and built for your actual life — not \"think positive\" advice.<\u002Fp>\n<\u002Fdiv>\n\n<!-- ===== CONDITIONS TAGS ===== -->\n<div style=\"max-width:980px;margin:0 auto;padding:clamp(48px,6vw,62px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3D6B1E\">Areas of focus<\u002Fdiv>\n  <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(26px,3.2vw,32px);font-weight:700;margin:10px 0 14px;color:#2F5616;letter-spacing:-.01em\">Conditions and methods our therapists cover<\u002Fh2>\n  <p style=\"font-size:16px;line-height:1.7;color:#3A4730;max-width:680px;margin-bottom:24px\">Our 91+ therapists are experienced in addressing a broad variety of mental health concerns and utilizing a wide variety of therapeutic modalities.<\u002Fp>\n  <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:28px\">\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#2F5616;color:#FFFFFF\">WORK STRESS<\u002Fspan>\n    <a href=\"https://manhattanmentalhealthcounseling.com/burnout-therapy/\" style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#F0F8E6;border:1px solid #DCE8CC;color:#2F5616;text-decoration:none\" style-hover=\"background:#E4F0D8\">BURNOUT<\u002Fa>\n    <a href=\"https://manhattanmentalhealthcounseling.com/anxiety-therapist-in-new-york/\" style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#F0F8E6;border:1px solid #DCE8CC;color:#2F5616;text-decoration:none\" style-hover=\"background:#E4F0D8\">ANXIETY<\u002Fa>\n    <a href=\"https://manhattanmentalhealthcounseling.com/depression-therapist-in-new-york/\" style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#F0F8E6;border:1px solid #DCE8CC;color:#2F5616;text-decoration:none\" style-hover=\"background:#E4F0D8\">DEPRESSION<\u002Fa>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">PERFECTIONISM<\u002Fspan>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">IMPOSTER SYNDROME<\u002Fspan>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">PERFORMANCE ANXIETY<\u002Fspan>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">LIFE TRANSITIONS<\u002Fspan>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">RELATIONSHIP ISSUES<\u002Fspan>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">TRAUMA &amp; PTSD<\u002Fspan>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">GRIEF &amp; LOSS<\u002Fspan>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">SLEEP ISSUES<\u002Fspan>\n    <a href=\"https://manhattanmentalhealthcounseling.com/executive-therapists-guide-nyc/\" style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#F0F8E6;border:1px solid #DCE8CC;color:#2F5616;text-decoration:none\" style-hover=\"background:#E4F0D8\">EXECUTIVE THERAPY<\u002Fa>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">COUPLES THERAPY<\u002Fspan>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">CBT<\u002Fspan>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">ACT<\u002Fspan>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">MINDFULNESS-BASED THERAPY<\u002Fspan>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">SOMATIC THERAPY<\u002Fspan>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">EMDR<\u002Fspan>\n    <span style=\"padding:10px 17px;border-radius:99px;font-size:12.5px;font-weight:700;letter-spacing:.04em;background:#FFFFFF;border:1px solid #E3E5DE;color:#5A6850\">DBT<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-wrap:wrap;gap:12px;align-items:center\">\n    <a href=\"#contact-now\" onclick=\"{{ scrollTo }}\" style=\"text-decoration:none;background:#8FD15F;color:#163209;font-size:15px;font-weight:700;border-radius:99px;padding:15px 30px\" style-hover=\"background:#7FC24D\">Start Therapy Now<\u002Fa>\n    <a href=\"tel:2129608626\" style=\"text-decoration:none;background:#FFFFFF;border:1px solid #C7D6B6;color:#2F5616;font-size:15px;font-weight:700;border-radius:99px;padding:14px 26px\">📞 212-960-8626<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== SELF CHECK ===== -->\n<div id=\"self-check\" style=\"max-width:920px;margin:0 auto;padding:clamp(48px,6vw,62px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3D6B1E\">A quick gut check<\u002Fdiv>\n  <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(26px,3.2vw,32px);font-weight:700;margin:10px 0 14px;color:#2F5616;letter-spacing:-.01em\">Questions to ask yourself about work stress<\u002Fh2>\n  <p style=\"font-size:16px;line-height:1.7;color:#3A4730;margin-bottom:24px\">A quick gut check on whether it is time to talk to someone:<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:22px\">\n    <div style=\"display:flex;gap:14px;align-items:flex-start;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:14px;padding:18px 20px\"><span style=\"flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center\">1<\u002Fspan><span style=\"font-size:15px;line-height:1.5;color:#2C3A22\">Does work follow me home — into my evenings, my sleep, or my weekends?<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:14px;align-items:flex-start;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:14px;padding:18px 20px\"><span style=\"flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center\">2<\u002Fspan><span style=\"font-size:15px;line-height:1.5;color:#2C3A22\">Are my usual ways of coping (exercise, time off, willpower) no longer doing the job?<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:14px;align-items:flex-start;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:14px;padding:18px 20px\"><span style=\"flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center\">3<\u002Fspan><span style=\"font-size:15px;line-height:1.5;color:#2C3A22\">Is the stress showing up in my body — headaches, tension, stomach, fatigue?<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:14px;align-items:flex-start;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:14px;padding:18px 20px\"><span style=\"flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center\">4<\u002Fspan><span style=\"font-size:15px;line-height:1.5;color:#2C3A22\">Am I more irritable, numb, or detached with the people I care about?<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:14px;align-items:flex-start;background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:14px;padding:18px 20px\"><span style=\"flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center\">5<\u002Fspan><span style=\"font-size:15px;line-height:1.5;color:#2C3A22\">Do I dread the workday in a way I did not used to?<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:#23391A;border-radius:14px;padding:20px 24px;display:flex;align-items:center;gap:14px\">\n    <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8FD15F\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n    <p style=\"font-size:16px;line-height:1.5;color:#E9F3E0;font-weight:600\">If you answered yes to two or more, work stress therapy is worth a conversation.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== TESTIMONIALS ===== -->\n<div style=\"max-width:1080px;margin:0 auto;padding:clamp(48px,6vw,62px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:24px\">\n    <div>\n      <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3D6B1E\">In their words<\u002Fdiv>\n      <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(26px,3.2vw,32px);font-weight:700;margin:10px 0 0;color:#2F5616;letter-spacing:-.01em\">What clients say<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"font-size:14px;color:#5A6850\">5,000+ clients since 2014 · rated <strong style=\"color:#2F5616\">4.0 on Google<\u002Fstrong><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px\">\n    <div style=\"background:#FFFFFF;border:1px solid #E3E5DE;border-radius:16px;padding:26px\"><div style=\"color:#E0A93C;font-size:17px;letter-spacing:2px;margin-bottom:12px\">★★★★★<\u002Fdiv><p style=\"font-size:15.5px;line-height:1.55;color:#3A4730;margin-bottom:16px\">[ Real Google review to be placed here — a verified client testimonial about work stress or burnout. ]<\u002Fp><div style=\"font-size:13px;color:#79828A;font-family:ui-monospace,Menlo,monospace\">— Client name, NY<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#FFFFFF;border:1px solid #E3E5DE;border-radius:16px;padding:26px\"><div style=\"color:#E0A93C;font-size:17px;letter-spacing:2px;margin-bottom:12px\">★★★★★<\u002Fdiv><p style=\"font-size:15.5px;line-height:1.55;color:#3A4730;margin-bottom:16px\">[ Real Google review to be placed here — about fit, scheduling, or results. ]<\u002Fp><div style=\"font-size:13px;color:#79828A;font-family:ui-monospace,Menlo,monospace\">— Client name, NY<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#FFFFFF;border:1px solid #E3E5DE;border-radius:16px;padding:26px\"><div style=\"color:#E0A93C;font-size:17px;letter-spacing:2px;margin-bottom:12px\">★★★★★<\u002Fdiv><p style=\"font-size:15.5px;line-height:1.55;color:#3A4730;margin-bottom:16px\">[ Real Google review to be placed here — about starting quickly with insurance. ]<\u002Fp><div style=\"font-size:13px;color:#79828A;font-family:ui-monospace,Menlo,monospace\">— Client name, NY<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== ACCEPTING NEW PATIENTS ===== -->\n<div style=\"max-width:880px;margin:0 auto;padding:clamp(48px,6vw,62px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3D6B1E\">Accepting new patients<\u002Fdiv>\n  <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(24px,3vw,30px);font-weight:700;margin:10px 0 16px;color:#2F5616;letter-spacing:-.01em\">Online work-stress therapists in New York accepting new patients<\u002Fh2>\n  <p style=\"font-size:16px;line-height:1.7;color:#3A4730;margin-bottom:14px\">Manhattan Mental Health Counseling is a New York State telehealth practice founded in 2014, rated 4.0 on Google, with 91+ therapists who provide online therapy for work stress, burnout, and anxiety. The practice is in-network with Aetna, Cigna, UnitedHealthcare (including Oxford and Optum), Healthfirst, Oscar, and more, is accepting new patients, and verifies coverage before the first session. All sessions are conducted by secure video across New York State.<\u002Fp>\n  <p style=\"font-size:16px;line-height:1.7;color:#3A4730;margin-bottom:24px\">If you have been putting off finding someone because you do not have time, that is exactly the problem online therapy solves. Every session is by video, so there is no commute and no geographic limit: whether you are in Manhattan, upstate, or working from anywhere in New York State, you can see the same therapist on a schedule that fits around your job, including evenings. We are taking new patients now, and we confirm your coverage before you start.<\u002Fp>\n  <div style=\"display:flex;flex-wrap:wrap;gap:12px;align-items:center\">\n    <a href=\"#contact-now\" onclick=\"{{ scrollTo }}\" style=\"text-decoration:none;background:#8FD15F;color:#163209;font-size:15px;font-weight:700;border-radius:99px;padding:15px 30px\" style-hover=\"background:#7FC24D\">Verify My Coverage &amp; Get Matched<\u002Fa>\n    <a href=\"tel:2129608626\" style=\"text-decoration:none;background:#FFFFFF;border:1px solid #C7D6B6;color:#2F5616;font-size:15px;font-weight:700;border-radius:99px;padding:14px 26px\">📞 212-960-8626<\u002Fa>\n    <a class=\"wslink\" href=\"https://manhattanmentalhealthcounseling.com/meet-all-therapists/\" style=\"font-size:14.5px;padding:14px 4px\">Meet our therapists →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== HOW TO START ===== -->\n<div id=\"how-to-start\" style=\"max-width:1000px;margin:0 auto;padding:clamp(48px,6vw,62px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3D6B1E\">Four simple steps<\u002Fdiv>\n  <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(26px,3.2vw,32px);font-weight:700;margin:10px 0 26px;color:#2F5616;letter-spacing:-.01em\">How to start work stress therapy<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px\">\n    <div style=\"background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:24px\"><span style=\"display:flex;width:36px;height:36px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:16px;font-weight:700;align-items:center;justify-content:center;margin-bottom:14px\">1<\u002Fspan><h3 style=\"font-size:16px;font-weight:700;margin:0 0 8px;color:#2F5616\">Submit the form<\u002Fh3><p style=\"font-size:14px;line-height:1.55;color:#41513A\">Tell us briefly what is going on and what your schedule looks like.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:24px\"><span style=\"display:flex;width:36px;height:36px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:16px;font-weight:700;align-items:center;justify-content:center;margin-bottom:14px\">2<\u002Fspan><h3 style=\"font-size:16px;font-weight:700;margin:0 0 8px;color:#2F5616\">Book your screening call<\u002Fh3><p style=\"font-size:14px;line-height:1.55;color:#41513A\">You'll get an email with a link to schedule a short call. We verify your insurance and answer cost questions before you commit.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:24px\"><span style=\"display:flex;width:36px;height:36px;border-radius:50%;background:#2F5616;color:#FFFFFF;font-family:'PT Serif',serif;font-size:16px;font-weight:700;align-items:center;justify-content:center;margin-bottom:14px\">3<\u002Fspan><h3 style=\"font-size:16px;font-weight:700;margin:0 0 8px;color:#2F5616\">Get matched<\u002Fh3><p style=\"font-size:14px;line-height:1.55;color:#41513A\">We pair you with a therapist who works with high-pressure professionals — and your style preference, direct or reflective.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#F0F8E6;border:1px solid #DCE8CC;border-left:3px solid #7DC242;border-radius:16px;padding:24px\"><span style=\"display:flex;width:36px;height:36px;border-radius:50%;background:#8FD15F;color:#163209;font-family:'PT Serif',serif;font-size:16px;font-weight:700;align-items:center;justify-content:center;margin-bottom:14px\">4<\u002Fspan><h3 style=\"font-size:16px;font-weight:700;margin:0 0 8px;color:#2F5616\">Start, usually within the week<\u002Fh3><p style=\"font-size:14px;line-height:1.55;color:#41513A\">If the fit is not right, you switch clinicians without restarting intake.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== FAQ ===== -->\n<div id=\"faq\" style=\"max-width:840px;margin:0 auto;padding:clamp(48px,6vw,62px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3D6B1E\">Common questions<\u002Fdiv>\n  <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(26px,3.2vw,32px);font-weight:700;margin:10px 0 8px;color:#2F5616;letter-spacing:-.01em\">Frequently asked questions<\u002Fh2>\n  <p style=\"font-size:15px;line-height:1.65;color:#5A6850;margin:0 0 20px\">If you don't see your question here, contact our support team at <a href=\"tel:2129608626\" style=\"color:#3568A8;font-weight:700;text-decoration:none\">212-960-8626<\u002Fa>.<\u002Fp>\n  <div style=\"display:flex;flex-direction:column;gap:12px\">\n    <details class=\"wsfaqd\" open=\"\" style=\"background:#23391A;border-radius:16px;overflow:hidden\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:21px 24px;font-size:16px;font-weight:700;color:#FFFFFF\"><span>What does a work stress therapist do?<\u002Fspan><span class=\"faqcirc\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:#34501C;color:#CFE3BD;font-size:19px;display:flex;align-items:center;justify-content:center;line-height:1\"><\u002Fspan><\u002Fsummary>\n      <div style=\"font-size:15px;line-height:1.7;color:#C9DDB6;padding:4px 24px 22px\">A work stress therapist helps you identify what is causing your stress, understand how it affects your thoughts and body, and build practical coping skills. Depending on your situation that can include cognitive reframing, boundary-setting, mindfulness, communication, and burnout prevention.<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"wsfaqd\" style=\"background:#23391A;border-radius:16px;overflow:hidden\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:21px 24px;font-size:16px;font-weight:700;color:#FFFFFF\"><span>How is work stress therapy different from regular therapy?<\u002Fspan><span class=\"faqcirc\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:#34501C;color:#CFE3BD;font-size:19px;display:flex;align-items:center;justify-content:center;line-height:1\"><\u002Fspan><\u002Fsummary>\n      <div style=\"font-size:15px;line-height:1.7;color:#C9DDB6;padding:4px 24px 22px\">General therapy can cover a wide range of concerns. Work stress therapy focuses specifically on how stress is affecting your functioning and what tools help you manage it, while still addressing anxiety, perfectionism, relationships, or self-esteem when those are tied to the stress.<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"wsfaqd\" style=\"background:#23391A;border-radius:16px;overflow:hidden\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:21px 24px;font-size:16px;font-weight:700;color:#FFFFFF\"><span>What happens in the first session?<\u002Fspan><span class=\"faqcirc\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:#34501C;color:#CFE3BD;font-size:19px;display:flex;align-items:center;justify-content:center;line-height:1\"><\u002Fspan><\u002Fsummary>\n      <div style=\"font-size:15px;line-height:1.7;color:#C9DDB6;padding:4px 24px 22px\">The first session is about understanding what is going on, not diving straight into the deep end. Your therapist asks what brought you in, what the stress is affecting, what you have already tried, and what you want to be different. You start mapping the pattern and agree on what to focus on. You set the pace.<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"wsfaqd\" style=\"background:#23391A;border-radius:16px;overflow:hidden\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:21px 24px;font-size:16px;font-weight:700;color:#FFFFFF\"><span>How long does work stress therapy take?<\u002Fspan><span class=\"faqcirc\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:#34501C;color:#CFE3BD;font-size:19px;display:flex;align-items:center;justify-content:center;line-height:1\"><\u002Fspan><\u002Fsummary>\n      <div style=\"font-size:15px;line-height:1.7;color:#C9DDB6;padding:4px 24px 22px\">It depends on what is driving the stress. Skills-focused work for a specific stressor can move in a handful of sessions; stress tangled up with perfectionism, anxiety, or older patterns usually takes longer. Most people meet weekly to start and adjust as things improve, and your therapist will be straight with you about what your situation looks like.<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"wsfaqd\" style=\"background:#23391A;border-radius:16px;overflow:hidden\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:21px 24px;font-size:16px;font-weight:700;color:#FFFFFF\"><span>Can therapy help with burnout?<\u002Fspan><span class=\"faqcirc\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:#34501C;color:#CFE3BD;font-size:19px;display:flex;align-items:center;justify-content:center;line-height:1\"><\u002Fspan><\u002Fsummary>\n      <div style=\"font-size:15px;line-height:1.7;color:#C9DDB6;padding:4px 24px 22px\">Yes. A therapist can help you understand the patterns that drive burnout — chronic overwork, perfectionism, thin boundaries, emotional exhaustion — and rebuild your capacity to recover. If burnout is severe or long-standing, your therapist may recommend dedicated burnout therapy.<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"wsfaqd\" style=\"background:#23391A;border-radius:16px;overflow:hidden\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:21px 24px;font-size:16px;font-weight:700;color:#FFFFFF\"><span>Do I have to be in crisis to start?<\u002Fspan><span class=\"faqcirc\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:#34501C;color:#CFE3BD;font-size:19px;display:flex;align-items:center;justify-content:center;line-height:1\"><\u002Fspan><\u002Fsummary>\n      <div style=\"font-size:15px;line-height:1.7;color:#C9DDB6;padding:4px 24px 22px\">No. Many people begin before reaching a crisis point. Therapy is especially useful when stress is persistent, your usual coping has stopped working, or you want to keep stress from turning into anxiety, depression, or burnout.<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"wsfaqd\" style=\"background:#23391A;border-radius:16px;overflow:hidden\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:21px 24px;font-size:16px;font-weight:700;color:#FFFFFF\"><span>How much does it cost with insurance?<\u002Fspan><span class=\"faqcirc\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:#34501C;color:#CFE3BD;font-size:19px;display:flex;align-items:center;justify-content:center;line-height:1\"><\u002Fspan><\u002Fsummary>\n      <div style=\"font-size:15px;line-height:1.7;color:#C9DDB6;padding:4px 24px 22px\">Most clients pay between $0 and $25 per session with in-network insurance. Coverage varies by plan, so we confirm your telehealth benefits and expected cost before your first session. We are in-network with Aetna, Cigna, UnitedHealthcare (including Oxford and Optum plans), Healthfirst, Oscar, and more.<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"wsfaqd\" style=\"background:#23391A;border-radius:16px;overflow:hidden\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:21px 24px;font-size:16px;font-weight:700;color:#FFFFFF\"><span>What if I don't want to use insurance?<\u002Fspan><span class=\"faqcirc\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:#34501C;color:#CFE3BD;font-size:19px;display:flex;align-items:center;justify-content:center;line-height:1\"><\u002Fspan><\u002Fsummary>\n      <div style=\"font-size:15px;line-height:1.7;color:#C9DDB6;padding:4px 24px 22px\">Self-pay is $175 per session. If you have out-of-network benefits, we provide a superbill you can submit to your plan for possible reimbursement, and we will walk you through what your plan is likely to cover before you start.<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"wsfaqd\" style=\"background:#23391A;border-radius:16px;overflow:hidden\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:21px 24px;font-size:16px;font-weight:700;color:#FFFFFF\"><span>How do I find a work stress therapist accepting new patients?<\u002Fspan><span class=\"faqcirc\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:#34501C;color:#CFE3BD;font-size:19px;display:flex;align-items:center;justify-content:center;line-height:1\"><\u002Fspan><\u002Fsummary>\n      <div style=\"font-size:15px;line-height:1.7;color:#C9DDB6;padding:4px 24px 22px\">Manhattan Mental Health Counseling is accepting new patients across New York State, all online. Submit the form or call, and we match you with a therapist and confirm your coverage before you start.<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"wsfaqd\" style=\"background:#23391A;border-radius:16px;overflow:hidden\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:21px 24px;font-size:16px;font-weight:700;color:#FFFFFF\"><span>How do I know if it's work stress or burnout?<\u002Fspan><span class=\"faqcirc\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:#34501C;color:#CFE3BD;font-size:19px;display:flex;align-items:center;justify-content:center;line-height:1\"><\u002Fspan><\u002Fsummary>\n      <div style=\"font-size:15px;line-height:1.7;color:#C9DDB6;padding:4px 24px 22px\">Work stress is the ongoing pressure itself. Burnout is what can develop after that pressure runs too long: emotional exhaustion, cynicism, and depletion that rest does not fix. If a weekend or a vacation still resets you, it is likely stress; if rest no longer resets you, it may be burnout. Our therapists treat both. <a href=\"https://manhattanmentalhealthcounseling.com/burnout-therapy/\" style=\"color:#8FD15F;font-weight:700;text-decoration:none\">Burnout therapy<\u002Fa> goes deeper if it is the latter.<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"wsfaqd\" style=\"background:#23391A;border-radius:16px;overflow:hidden\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:21px 24px;font-size:16px;font-weight:700;color:#FFFFFF\"><span>Will my employer or insurance find out I'm in therapy?<\u002Fspan><span class=\"faqcirc\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:#34501C;color:#CFE3BD;font-size:19px;display:flex;align-items:center;justify-content:center;line-height:1\"><\u002Fspan><\u002Fsummary>\n      <div style=\"font-size:15px;line-height:1.7;color:#C9DDB6;padding:4px 24px 22px\">Your sessions are confidential and protected by HIPAA. Your employer does not receive your records. If you use insurance, your plan receives standard billing information such as session dates and diagnosis codes to process claims, but not what you discuss in session. If privacy is a particular concern, ask us about self-pay options.<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"wsfaqd\" style=\"background:#23391A;border-radius:16px;overflow:hidden\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:21px 24px;font-size:16px;font-weight:700;color:#FFFFFF\"><span>Do you offer in-person sessions?<\u002Fspan><span class=\"faqcirc\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:#34501C;color:#CFE3BD;font-size:19px;display:flex;align-items:center;justify-content:center;line-height:1\"><\u002Fspan><\u002Fsummary>\n      <div style=\"font-size:15px;line-height:1.7;color:#C9DDB6;padding:4px 24px 22px\">No. Manhattan Mental Health Counseling is fully telehealth. All sessions are conducted by secure video, available anywhere in New York State.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== CONTACT ===== -->\n<div id=\"contact-now\" style=\"max-width:1080px;margin:clamp(48px,6vw,68px) auto 0;padding:0 clamp(20px,5vw,36px)\">\n  <div style=\"background:#2F5616;border-radius:24px;overflow:hidden;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr))\">\n    <div style=\"padding:clamp(30px,4vw,48px);color:#FFFFFF;font-family:'DM Sans',sans-serif\">\n      <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#AFD589;margin-bottom:14px\">Get started<\u002Fdiv>\n      <h2 style=\"font-family:'PT Serif',serif;font-size:clamp(26px,3.2vw,34px);font-weight:700;margin:0 0 16px;color:#FFFFFF;letter-spacing:-.01em\">Get started with work stress therapy<\u002Fh2>\n      <p style=\"font-size:16px;line-height:1.7;color:#D9E7C8;margin-bottom:14px\">If work stress is affecting your sleep, health, relationships, or sense of yourself, you do not have to keep pushing through it alone. A therapist can help you understand what is driving it and change the part you actually have control over.<\u002Fp>\n      <p style=\"font-size:16px;line-height:1.7;color:#D9E7C8;margin-bottom:24px\">Submit the form and you will get an email with a link to book a screening call at your convenience.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:12px\">\n        <div style=\"display:flex;align-items:center;gap:12px;font-size:15px;color:#E9F3E0\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8FD15F\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Same-week openings · no in-network waitlist<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px;font-size:15px;color:#E9F3E0\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8FD15F\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Coverage verified before your first session<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px;font-size:15px;color:#E9F3E0\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8FD15F\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Secure video, anywhere in New York State<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FDFDFB;padding:clamp(26px,3vw,38px);font-family:'DM Sans',sans-serif\">\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:30px 10px\">\n          <div style=\"width:56px;height:56px;border-radius:50%;background:#F0F8E6;display:flex;align-items:center;justify-content:center;margin:0 auto 18px\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2F5616\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'PT Serif',serif;font-size:22px;color:#2F5616;margin:0 0 10px;font-weight:700\">Thank you — we've got it.<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.6;color:#41513A\">Check your inbox for an email with a link to book your screening call. We'll verify your coverage before your first session.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n      <form onsubmit=\"{{ submit }}\">\n        <h3 style=\"font-family:'PT Serif',serif;font-size:21px;color:#2F5616;margin:0 0 4px;font-weight:700\">Start therapy now<\u002Fh3>\n        <p style=\"font-size:13.5px;color:#79828A;margin:0 0 20px\">Takes about a minute. No payment required to start.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px\">\n          <label style=\"display:flex;flex-direction:column;gap:6px;font-size:12.5px;font-weight:600;color:#3A4730\">First name<input type=\"text\" required=\"\" style=\"font-family:inherit;font-size:15px;padding:12px 13px;border:1px solid #DCE8CC;border-radius:10px;background:#F7FAF1;color:#2C3A22\"><\u002Flabel>\n          <label style=\"display:flex;flex-direction:column;gap:6px;font-size:12.5px;font-weight:600;color:#3A4730\">Last name<input type=\"text\" required=\"\" style=\"font-family:inherit;font-size:15px;padding:12px 13px;border:1px solid #DCE8CC;border-radius:10px;background:#F7FAF1;color:#2C3A22\"><\u002Flabel>\n        <\u002Fdiv>\n        <label style=\"display:flex;flex-direction:column;gap:6px;font-size:12.5px;font-weight:600;color:#3A4730;margin-bottom:12px\">Email<input type=\"email\" required=\"\" style=\"font-family:inherit;font-size:15px;padding:12px 13px;border:1px solid #DCE8CC;border-radius:10px;background:#F7FAF1;color:#2C3A22\"><\u002Flabel>\n        <label style=\"display:flex;flex-direction:column;gap:6px;font-size:12.5px;font-weight:600;color:#3A4730;margin-bottom:12px\">Phone<input type=\"tel\" style=\"font-family:inherit;font-size:15px;padding:12px 13px;border:1px solid #DCE8CC;border-radius:10px;background:#F7FAF1;color:#2C3A22\"><\u002Flabel>\n        <label style=\"display:flex;flex-direction:column;gap:6px;font-size:12.5px;font-weight:600;color:#3A4730;margin-bottom:12px\">Insurance (optional)\n          <select style=\"font-family:inherit;font-size:15px;padding:12px 13px;border:1px solid #DCE8CC;border-radius:10px;background:#F7FAF1;color:#2C3A22\"><option>I'll confirm later<\u002Foption><option>Aetna<\u002Foption><option>Cigna<\u002Foption><option>UnitedHealthcare<\u002Foption><option>Healthfirst<\u002Foption><option>Oscar<\u002Foption><option>Self-pay<\u002Foption><option>Other<\u002Foption><\u002Fselect>\n        <\u002Flabel>\n        <label style=\"display:flex;flex-direction:column;gap:6px;font-size:12.5px;font-weight:600;color:#3A4730;margin-bottom:18px\">What's going on, and what does your schedule look like?<textarea rows=\"3\" style=\"font-family:inherit;font-size:15px;padding:12px 13px;border:1px solid #DCE8CC;border-radius:10px;background:#F7FAF1;color:#2C3A22;resize:vertical\"><\u002Ftextarea><\u002Flabel>\n        <button type=\"submit\" style=\"width:100%;background:#8FD15F;color:#163209;border:none;padding:16px;border-radius:99px;font-family:inherit;font-weight:700;font-size:16px;cursor:pointer\" style-hover=\"background:#7FC24D\">Submit &amp; book my screening call<\u002Fbutton>\n        <p style=\"font-size:12px;line-height:1.5;color:#79828A;text-align:center;margin:14px 0 0\">Confidential and protected by HIPAA. Prefer to talk? Call <a href=\"tel:2129608626\" style=\"color:#3568A8;font-weight:700;text-decoration:none\">212-960-8626<\u002Fa>.<\u002Fp>\n      <\u002Fform>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== REVIEWER + REFERENCES ===== -->\n<div id=\"references\" style=\"max-width:880px;margin:0 auto;padding:clamp(40px,5vw,56px) 24px 0;font-family:'DM Sans',sans-serif\">\n  <div style=\"display:flex;gap:18px;align-items:flex-start;background:#F0F8E6;border:1px solid #DCE8CC;border-radius:16px;padding:24px 26px\">\n    <div style=\"flex:none;width:46px;height:46px;border-radius:50%;background:#2F5616;display:flex;align-items:center;justify-content:center\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 12l2 2 4-4\"><\u002Fpath><path d=\"M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n    <div>\n      <div style=\"font-family:'PT Serif',serif;font-size:19px;font-weight:700;color:#2F5616\">Reviewed by Natalie Buchwald, LMHC-D<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.65;color:#41513A;margin:8px 0 0\">Founder and clinical director of <a class=\"wslink\" href=\"https://manhattanmentalhealthcounseling.com/meet-the-founders/\">Manhattan Mental Health Counseling<\u002Fa> and a licensed mental health counselor in New York State. This page was clinically reviewed for accuracy and clinical voice.<\u002Fp>\n      <p style=\"font-size:13px;color:#79828A;margin:10px 0 0\">Last Updated: June 2026 &nbsp;|&nbsp; Next Review: December 2026<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:34px\">\n    <h2 style=\"font-family:'PT Serif',serif;font-size:22px;font-weight:700;margin:0 0 16px;color:#2F5616\">References<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:14px\">\n      <div style=\"font-size:13px;line-height:1.6;color:#5A6850;border-left:3px solid #DCE8CC;padding-left:14px\">American Psychological Association. (2023). <em>Work in America Survey: Workplaces as Engines of Psychological Health and Well-Being.<\u002Fem> <a class=\"wslink\" href=\"https://www.apa.org/pubs/reports/work-in-america\" style=\"word-break:break-all\">apa.org/pubs/reports/work-in-america<\u002Fa><\u002Fdiv>\n      <div style=\"font-size:13px;line-height:1.6;color:#5A6850;border-left:3px solid #DCE8CC;padding-left:14px\">Flückiger, C., Del Re, A. C., Wampold, B. E., &amp; Horvath, A. O. (2018). The alliance in adult psychotherapy: A meta-analytic synthesis. <em>Psychotherapy, 55(4),<\u002Fem> 316–340. <a class=\"wslink\" href=\"https://doi.org/10.1037/pst0000172\" style=\"word-break:break-all\">doi.org/10.1037/pst0000172<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:26px;background:#F0F8E6;border:1px solid #DCE8CC;border-radius:14px;padding:18px 22px;font-size:13px;line-height:1.65;color:#41513A\"><strong style=\"color:#2F5616\">Note:<\u002Fstrong> This page is for informational purposes and is not medical advice. If you have persistent or concerning symptoms, consult a licensed medical professional. If you are in crisis or immediate danger, call 911 or go to the nearest emergency room, or call or text 988 for the Suicide and Crisis Lifeline.<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== FOOTER ===== -->\n<footer style=\"background:#22390F;color:#C5D3B4;font-family:'DM Sans',sans-serif;margin-top:clamp(48px,6vw,68px)\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:clamp(44px,5vw,64px) clamp(20px,5vw,36px) 32px\">\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:34px;padding-bottom:36px;border-bottom:1px solid #34501C\">\n      <div>\n        <div style=\"display:flex;gap:10px;align-items:center;margin-bottom:14px\"><span style=\"width:34px;height:34px;border-radius:50%;border:3px solid #8FD15F;position:relative;flex:0 0 auto\"><span style=\"position:absolute;right:-2px;top:4px;width:10px;height:10px;border-radius:50%;background:#8FD15F\"><\u002Fspan><\u002Fspan><span style=\"font-size:14px;font-weight:700;line-height:1.1;color:#EAF4DA\">Manhattan Mental<br>Health Counseling<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.7\">303 Fifth Avenue, Suite 1108<br>New York, NY 10016<\u002Fp>\n        <p style=\"font-size:14px;line-height:1.7;margin-top:12px\">Mon–Thu 9:00am–5:30pm<br>Fri 9:00am–5:00pm<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7E9A5C;margin-bottom:16px\">Quick navigation<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font-size:14.5px\">\n          <a href=\"https://manhattanmentalhealthcounseling.com/\" style=\"text-decoration:none;color:#D9E7C8\">Home<\u002Fa>\n          <a href=\"https://manhattanmentalhealthcounseling.com/meet-all-therapists/\" style=\"text-decoration:none;color:#D9E7C8\">Meet the Team<\u002Fa>\n          <a href=\"https://manhattanmentalhealthcounseling.com/insurance/\" style=\"text-decoration:none;color:#D9E7C8\">Insurance<\u002Fa>\n          <a href=\"https://manhattanmentalhealthcounseling.com/contact/\" style=\"text-decoration:none;color:#D9E7C8\">Contact<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7E9A5C;margin-bottom:16px\">Popular services<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font-size:14.5px\">\n          <a href=\"https://manhattanmentalhealthcounseling.com/burnout-therapy/\" style=\"text-decoration:none;color:#D9E7C8\">Burnout Therapy<\u002Fa>\n          <a href=\"https://manhattanmentalhealthcounseling.com/anxiety-therapist-in-new-york/\" style=\"text-decoration:none;color:#D9E7C8\">Anxiety Therapy<\u002Fa>\n          <a href=\"https://manhattanmentalhealthcounseling.com/depression-therapist-in-new-york/\" style=\"text-decoration:none;color:#D9E7C8\">Depression Therapy<\u002Fa>\n          <a href=\"https://manhattanmentalhealthcounseling.com/executive-therapists-guide-nyc/\" style=\"text-decoration:none;color:#D9E7C8\">Executive Therapy<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7E9A5C;margin-bottom:16px\">Your mental health matters<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.6;margin-bottom:16px\">Call us — we're here to help you get started.<\u002Fp>\n        <a href=\"tel:2129608626\" style=\"display:inline-block;background:#8FD15F;color:#163209;padding:13px 24px;border-radius:99px;font-weight:700;font-size:15px;text-decoration:none\" style-hover=\"background:#7FC24D\">📞 212-960-8626<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px;justify-content:space-between;align-items:center;padding-top:22px;font-size:13px;color:#7E9A5C\">\n      <span>© {{ year }} Manhattan Mental Health Counseling LLC<\u002Fspan>\n      <span style=\"display:flex;gap:18px;flex-wrap:wrap\">\n        <a href=\"https://manhattanmentalhealthcounseling.com/privacy-policy/\" style=\"text-decoration:none;color:#7E9A5C\">Privacy Notice<\u002Fa>\n        <a href=\"https://manhattanmentalhealthcounseling.com/emergency-resources/\" style=\"text-decoration:none;color:#7E9A5C\">Emergency Resources<\u002Fa>\n      <\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;showStickyCta&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showCostCard&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { submitted: false };\n  renderVals() {\n    const scrollTo = (e) => {\n      try {\n        const href = e.currentTarget.getAttribute('href');\n        if (!href || href[0] !== '#') return;\n        e.preventDefault();\n        const el = document.getElementById(href.slice(1));\n        if (el) {\n          const y = el.getBoundingClientRect().top + window.pageYOffset - 96;\n          window.scrollTo({ top: y, behavior: 'smooth' });\n        }\n      } catch (err) {}\n    };\n    const submit = (e) => {\n      e.preventDefault();\n      this.setState({ submitted: true });\n      try {\n        const el = document.getElementById('contact-now');\n        if (el) { const y = el.getBoundingClientRect().top + window.pageYOffset - 96; window.scrollTo({ top: y, behavior: 'smooth' }); }\n      } catch (err) {}\n    };\n    const setRoot = (el) => { if (el) this._root = el; };\n    return {\n      scrollTo,\n      submit,\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      setRoot,\n      year: new Date().getFullYear(),\n      showStickyCta: this.props.showStickyCta ?? true,\n      showCostCard: this.props.showCostCard ?? true\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
